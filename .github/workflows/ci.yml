# PR / push 检查:lint + 双端编译冒烟(不签名、不打包)。
# 对应「构建签名发布方案」② 流水线:PR 跑 lint/测试/双端冒烟。
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: lint + build smoke (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 仓库根即 app/,故 src-tauri 在 ./src-tauri
      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: build (debug, no bundle)
        run: cargo build --manifest-path src-tauri/Cargo.toml

  typecheck:
    name: typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 锁住隐私不变量(SecretApi 无 get()、Collection 排除 profile);
      # @ts-check 的 platform/domain 模块在此真正被类型检查。
      - run: npm ci
      - run: npm run typecheck
