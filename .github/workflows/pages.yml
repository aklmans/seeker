# pages.yml —— Web 演示版部署:web/ 是纯静态(无构建步骤、全相对路径),
# 直接作为 Pages 工件发布到 https://aklmans.github.io/seeker/。
# 网页运行时 = IndexedDB + 降级回复(无密钥、无 Rust 能力)—— 定位是「打开浏览一下」的
# 体验演示;完整能力(真实 AI 工具循环 / 记忆 / 连接器 / 钥匙串)在桌面端。
name: pages

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/pages.yml']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
