# release.yml —— 发布构建:tag 推送(v*)或手动触发,出 macOS dmg + Windows NSIS,
# 上传到同名 tag 的 GitHub Release(须已存在;本仓发布流程 = 先 gh release create 再触发本流水线,
# 或推 tag 前先建 Release —— 避免 CI 代建 Release 覆盖手写的 release notes)。
#
# ★现阶段刻意「无签名」:不设任何 APPLE_*/WINDOWS_* env(设了空值反而让签名流程失败)。
#   - macOS:未签名/未公证 ⇒ 用户右键打开(docs/QUICKSTART.md 有说明);拿到 Apple 证书后按
#     docs/RELEASE.md 配 secrets 并在本文件恢复签名 env。
#   - Windows:无证书 ⇒ SmartScreen「更多信息 → 仍要运行」;个人证书性价比低,暂不办。
#   - updater 签名(TAURI_SIGNING_*)留待 updater 上线时按 docs/RELEASE.md 配。
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建并上传产物的既有 Release tag(如 v0.1.0)'
        required: true
        type: string

permissions:
  contents: write # gh release upload

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
            asset_glob: src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            bundles: dmg
            asset_glob: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 工具链版本 + 组件由 rust-toolchain.toml 固定(rustup 自己读,单一真源;同 ci.yml)。
      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build bundle (${{ matrix.bundles }}, unsigned)
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload to release ${{ steps.tag.outputs.tag }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" ${{ matrix.asset_glob }} --clobber
