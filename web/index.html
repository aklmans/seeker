<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求职岗位研究工作台</title>
<style>
:root{
  --bg:#FAFAFA; --bg-elevated:#FFFFFF; --bg-subtle:#F5F2EC;
  --ink:#1A1A1A; --ink-2:#3A3A3A; --ink-3:#6B6B6B; --ink-mute:#9A9A9A;
  --border:#E5E3DE; --border-strong:#C0BFBA;
  --accent:#C95F3D; --accent-soft:#F5E8E0;
  --status-info:#4A6F8A; --status-progress:#C95F3D; --status-done:#5A7A5A; --status-skip:#9A9A9A;
  --font-serif:'Iowan Old Style','Apple Garamond',Baskerville,Georgia,'Times New Roman','STSong','Songti SC','宋体',serif;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','微软雅黑','Hiragino Sans GB',sans-serif;
  --font-mono:'SF Mono',Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;
}
html[data-theme="dark"]{
  --bg:#1A1A1A; --bg-elevated:#232323; --bg-subtle:#2A2723;
  --ink:#F5F0E8; --ink-2:#B8B8B8; --ink-3:#8A847A; --ink-mute:#5E5953;
  --border:#3A3631; --border-strong:#4A4540;
  --accent:#E8835B; --accent-soft:#2D211C;
  --status-info:#7596AE; --status-done:#85A085;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--font-sans); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background 200ms ease, color 200ms ease;
}
button{font-family:inherit;}
::selection{background:var(--accent-soft); color:var(--accent);}

/* ===== Layout ===== */
.app{display:flex; min-height:100vh;}
.sidebar{
  width:200px; flex:0 0 200px; background:var(--bg-subtle);
  border-right:0.5px solid var(--border); position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; transition:background 200ms ease;
}
.brand{padding:22px 20px 18px; font-family:var(--font-mono); font-size:12px; letter-spacing:0.3em; font-weight:600; color:var(--ink);}
.nav{flex:1; padding:4px 12px;}
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  padding:9px 10px; margin:1px 0; border:none; background:transparent; cursor:pointer;
  font-family:var(--font-sans); font-size:13.5px; color:var(--ink-2); border-radius:3px;
  transition:background 120ms ease, color 120ms ease;
}
.nav-item:hover{background:rgba(0,0,0,0.035);}
html[data-theme="dark"] .nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item .marker{width:8px; height:8px; flex:0 0 8px; border:1px solid var(--border-strong); background:transparent;}
.nav-item.active{color:var(--accent); font-weight:500;}
.nav-item.active .marker{background:var(--accent); border-color:var(--accent);}
.nav-item .count{margin-left:auto; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:var(--ink-3);}
.nav-item.active .count{color:var(--accent);}
.sidebar-foot{padding:14px 20px; border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between;}
.sidebar-foot .ver{font-family:var(--font-mono); font-size:10px; letter-spacing:0.2em; color:var(--ink-3);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  height:56px; flex:0 0 56px; position:sticky; top:0; z-index:30;
  background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(8px);
  border-bottom:0.5px solid var(--border); display:flex; align-items:center;
  padding:0 28px; gap:16px; transition:background 200ms ease, border-color 200ms ease;
}
.crumb{font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; color:var(--ink-3); text-transform:uppercase;}
.crumb b{color:var(--ink-2); font-weight:600;}
.topbar-actions{margin-left:auto; display:flex; align-items:center; gap:10px;}

.content{flex:1; padding:0 28px 0; max-width:1180px; width:100%; margin:0 auto;}
.page{display:none;}
.page.active{display:block; opacity:1;}
@media (prefers-reduced-motion:no-preference){
  .page.active{animation:fade 200ms ease both;}
}
@keyframes fade{from{transform:translateY(4px);} to{transform:none;}}

/* ===== Frontispiece ===== */
.frontis{padding:26px 0 22px; border-bottom:0.5px solid var(--border); display:flex; align-items:flex-end; justify-content:space-between; gap:24px;}
.eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:0.25em; color:var(--ink-3); margin:0; text-transform:uppercase;}
.title{font-family:var(--font-serif); font-style:italic; font-weight:500; font-size:32px; margin:7px 0 0; color:var(--ink); line-height:1.05;}
.title .dot{color:var(--accent); font-style:normal;}

/* ===== Section label ===== */
.seclabel{font-family:var(--font-mono); font-size:11px; letter-spacing:0.25em; color:var(--ink-3); margin:0; text-transform:uppercase;}
.sectitle{font-family:var(--font-serif); font-style:italic; font-weight:500; font-size:19px; margin:6px 0 0; color:var(--ink);}
.sectitle .dot{color:var(--accent); font-style:normal;}
.sec{padding:30px 0; border-bottom:0.5px solid var(--border);}
.sec:last-of-type{border-bottom:none;}

/* ===== Buttons ===== */
.btn{padding:8px 16px; border:1px solid var(--border-strong); color:var(--ink-2); background:transparent; font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; cursor:pointer; transition:all 150ms ease; text-transform:uppercase; white-space:nowrap;}
.btn:hover{border-color:var(--ink-3); color:var(--ink);}
.btn-accent{border-color:var(--accent); color:var(--accent);}
.btn-accent:hover{background:var(--accent); color:#fff;}
html[data-theme="dark"] .btn-accent:hover{color:#1A1A1A;}
.btn-text{padding:0; border:none; background:transparent; color:var(--accent); font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; cursor:pointer;}
.btn-text:hover{text-decoration:underline; text-underline-offset:3px;}
.iconbtn{width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border:0.5px solid var(--border-strong); background:transparent; color:var(--ink-2); cursor:pointer; transition:all 150ms ease;}
.iconbtn:hover{color:var(--accent); border-color:var(--accent);}
.iconbtn svg{width:16px; height:16px;}

/* ===== Badges ===== */
.badge{display:inline-block; padding:2px 8px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; line-height:1.5; white-space:nowrap;}
.b-info{border:0.5px solid var(--status-info); color:var(--status-info);}
.b-todo{border:0.5px solid var(--border-strong); color:var(--ink-3);}
.b-sent{border:0.5px solid var(--accent); color:var(--accent);}
.b-interview{background:var(--accent); color:#fff;}
html[data-theme="dark"] .b-interview{color:#1A1A1A;}
.b-reject{border:0.5px solid var(--ink-mute); color:var(--ink-mute);}
.b-skip{border:0.5px solid var(--ink-mute); color:var(--ink-mute);}
.b-done{border:0.5px solid var(--status-done); color:var(--status-done);}
.chip{display:inline-block; padding:2px 7px; border:0.5px solid var(--border); color:var(--ink-2); font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; background:var(--bg-elevated);}
.chip.gap{border-style:dashed; color:var(--ink-3);}

/* ===== Stats ===== */
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); border:0.5px solid var(--border); background:var(--bg-elevated);}
.stat{padding:22px 22px; border-right:0.5px solid var(--border);}
.stat:last-child{border-right:none;}
.stat .num{font-family:var(--font-serif); font-size:36px; font-weight:500; color:var(--ink); line-height:1; letter-spacing:-0.01em;}
.stat .num small{font-family:var(--font-mono); font-size:13px; color:var(--ink-3); font-weight:500;}
.stat .lab{font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.2em; color:var(--ink-3); margin-top:12px; text-transform:uppercase;}
.stat .sub{font-size:12px; color:var(--ink-3); margin-top:3px;}

/* ===== Progress / bars ===== */
.bar{position:relative; height:4px; background:var(--border); overflow:hidden;}
.bar > i{position:absolute; left:0; top:0; bottom:0; background:var(--accent); display:block;}
.barrow{display:grid; grid-template-columns:64px 1fr 40px; align-items:center; gap:14px; margin:9px 0;}
.barrow .blab{font-size:13px; color:var(--ink-2);}
.barrow .btrack{height:14px; background:var(--border); position:relative;}
.barrow .btrack > i{position:absolute; left:0; top:0; bottom:0;}
.barrow .bval{font-family:var(--font-mono); font-size:12px; color:var(--ink-3); text-align:right;}

/* ===== Tables ===== */
table{width:100%; border-collapse:collapse;}
thead th{font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.18em; color:var(--ink-3); text-transform:uppercase; font-weight:600; text-align:left; padding:10px 12px; border-bottom:0.5px solid var(--border-strong);}
tbody td{padding:13px 12px; border-bottom:0.5px solid var(--border); font-size:14px; color:var(--ink-2); vertical-align:middle;}
tbody tr{cursor:pointer; transition:background 100ms ease; position:relative;}
tbody tr:hover{background:var(--bg-subtle);}
tbody tr.selected{background:var(--accent-soft);}
tbody tr.selected td:first-child{box-shadow:inset 2px 0 0 var(--accent);}
.mono{font-family:var(--font-mono);}
.idx{font-family:var(--font-mono); font-size:12px; color:var(--accent); letter-spacing:0.05em;}
.co{font-weight:600; color:var(--ink);}
.num-cell{font-family:var(--font-mono); font-size:13px; color:var(--ink-2);}
.num-cell small{color:var(--ink-mute);}

/* ===== Two col ===== */
.cols2{display:grid; grid-template-columns:1fr 1fr; gap:0; border:0.5px solid var(--border); background:var(--bg-elevated);}
.cols2 > div{padding:24px;}
.cols2 > div:first-child{border-right:0.5px solid var(--border);}

/* ===== Gap item ===== */
.gap-item{padding:14px 0; border-bottom:0.5px solid var(--border);}
.gap-item:last-child{border-bottom:none;}
.gap-head{display:flex; align-items:baseline; gap:12px;}
.gap-head .gi{font-family:var(--font-mono); font-size:12px; color:var(--accent);}
.gap-head .gn{font-size:15px; color:var(--ink); font-weight:500;}
.gap-meta{font-size:12px; color:var(--ink-3); margin:5px 0 8px; padding-left:30px;}
.gap-bar{padding-left:30px; display:flex; align-items:center; gap:12px;}
.gap-bar .bar{flex:1; max-width:160px;}
.gap-bar .pl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:var(--ink-3);}

/* ===== Checklist mini ===== */
.mini-todo{display:flex; align-items:center; gap:11px; padding:11px 0; border-bottom:0.5px solid var(--border); font-size:13.5px; color:var(--ink-2);}
.mini-todo:last-of-type{border-bottom:none;}
.cbox{width:15px; height:15px; flex:0 0 15px; border:1px solid var(--border-strong); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:all 120ms ease;}
.cbox svg{width:11px; height:11px; opacity:0; color:var(--status-done);}
.cbox.half{background:var(--accent-soft); border-color:var(--accent);}
.cbox.half::after{content:""; width:7px; height:7px; background:var(--accent);}
.cbox.done{background:transparent; border-color:var(--status-done);}
.cbox.done svg{opacity:1;}

/* ===== Score dots ===== */
.dots{display:inline-flex; gap:3px;}
.dots span{width:8px; height:8px; border-radius:50%; border:1px solid var(--border-strong); display:inline-block;}
.dots span.on{background:var(--accent); border-color:var(--accent);}
.dots.lvl span.on{background:var(--ink-2); border-color:var(--ink-2);}

/* ===== Skill cards ===== */
.skill-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
.skill-card{border:0.5px solid var(--border); background:var(--bg-elevated); padding:18px; cursor:pointer; transition:border-color 150ms ease;}
.skill-card:hover{border-color:var(--border-strong);}
.skill-card .sname{font-size:16px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:7px;}
.skill-card .star{color:var(--accent); font-size:12px;}
.skill-card .slvl{display:flex; align-items:center; gap:9px; margin:11px 0 4px;}
.skill-card .slvl .mono{font-size:11px; color:var(--ink-3);}
.skill-card .sstate{font-size:12.5px; color:var(--ink-3);}
.skill-card .sevi{margin-top:14px; padding-top:13px; border-top:0.5px solid var(--border);}
.skill-card .sevi .ec{font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--ink-3); text-transform:uppercase;}
.skill-card .sevi ul{margin:8px 0 0; padding:0; list-style:none;}
.skill-card .sevi li{font-size:12.5px; color:var(--ink-2); padding:3px 0 3px 12px; position:relative;}
.skill-card .sevi li::before{content:"·"; position:absolute; left:2px; color:var(--ink-mute);}
.skill-card .sdemand{margin-top:13px; font-size:11.5px; color:var(--ink-3); display:flex; justify-content:space-between; align-items:center;}
.skill-card .pl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em;}
.pl-high{color:var(--accent);} .pl-mid{color:var(--ink-3);} .pl-low{color:var(--ink-mute);}

/* ===== Tabs / filter ===== */
.filterbar{display:flex; flex-wrap:wrap; gap:8px 18px; align-items:center; padding:16px 0;}
.filtergroup{display:flex; align-items:center; gap:4px;}
.filtergroup .fl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; color:var(--ink-mute); text-transform:uppercase; margin-right:6px;}
.fopt{padding:3px 9px; font-size:12.5px; color:var(--ink-3); background:transparent; border:none; cursor:pointer; border-radius:3px;}
.fopt:hover{color:var(--ink);}
.fopt.on{color:var(--accent); background:var(--accent-soft);}
.tabs{display:flex; gap:2px; border-bottom:0.5px solid var(--border); margin-top:6px;}
.tab{padding:9px 14px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--ink-3); background:transparent; border:none; border-bottom:2px solid transparent; cursor:pointer; text-transform:uppercase; margin-bottom:-0.5px;}
.tab:hover{color:var(--ink-2);}
.tab.on{color:var(--accent); border-bottom-color:var(--accent);}

/* ===== Matrix ===== */
.matrix-wrap{overflow-x:auto; border:0.5px solid var(--border);}
table.matrix{min-width:760px;}
table.matrix th, table.matrix td{text-align:center; padding:9px 6px; border-bottom:0.5px solid var(--border); border-right:0.5px solid var(--border);}
table.matrix th:first-child, table.matrix td:first-child{text-align:left; padding-left:14px; position:sticky; left:0; background:var(--bg-elevated); z-index:1; min-width:150px;}
table.matrix thead th{font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; color:var(--ink-3); writing-mode:horizontal-tb;}
table.matrix tbody td{font-size:13px;}
.cell-has{color:var(--ink); }
.cell-gap{color:var(--ink-mute);}
.skill-gaplabel{color:var(--accent); font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; margin-left:6px;}

/* ===== Keyword cloud ===== */
.cloud{display:flex; flex-wrap:wrap; gap:10px 18px; align-items:baseline; padding:6px 0;}
.cloud .kw{font-family:var(--font-mono); color:var(--ink-2); letter-spacing:0.04em;}
.cloud .kw b{color:var(--ink); font-weight:600;}
.cloud .kw .c{color:var(--ink-mute); font-size:0.7em;}

/* ===== Action cards ===== */
.act-card{border:0.5px solid var(--border); background:var(--bg-elevated); padding:16px 18px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start; position:relative; transition:box-shadow 150ms ease, opacity 150ms ease;}
.act-card:hover{box-shadow:inset 2px 0 0 var(--accent);}
.act-card.flash{animation:flash 600ms ease;}
@keyframes flash{0%{box-shadow:inset 2px 0 0 var(--accent), 0 0 0 1px var(--accent-soft);} 100%{box-shadow:none;}}
.act-card.is-done{opacity:0.6;}
.act-card.is-done .act-title{text-decoration:line-through; color:var(--ink-3);}
.act-body{flex:1; min-width:0;}
.act-title{font-size:14.5px; color:var(--ink); font-weight:500;}
.act-meta{font-size:12px; color:var(--ink-3); margin-top:6px; display:flex; flex-wrap:wrap; gap:4px 14px;}
.act-rel{font-size:12px; color:var(--ink-3); margin-top:7px;}
.act-rel b{color:var(--ink-2); font-weight:500;}
.cbox.lg{width:18px; height:18px; flex:0 0 18px; margin-top:1px;}
.cbox.lg svg{width:13px; height:13px;}

/* ===== Settings ===== */
.set-row{display:grid; grid-template-columns:160px 1fr; align-items:center; padding:13px 0; gap:20px; border-bottom:0.5px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row .sk{font-size:13.5px; color:var(--ink-2);}
.seg{display:inline-flex; border:0.5px solid var(--border-strong);}
.seg button{padding:6px 14px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; background:transparent; border:none; border-right:0.5px solid var(--border-strong); color:var(--ink-3); cursor:pointer;}
.seg button:last-child{border-right:none;}
.seg button.on{background:var(--accent-soft); color:var(--accent);}
.weight-row{display:grid; grid-template-columns:90px 1fr 46px; align-items:center; gap:14px; margin:11px 0;}
.weight-row .wl{font-size:13px; color:var(--ink-2);}
.range{-webkit-appearance:none; appearance:none; width:100%; height:4px; background:var(--border); outline:none; cursor:pointer;}
.range::-webkit-slider-thumb{-webkit-appearance:none; width:14px; height:14px; background:var(--accent); cursor:pointer; border:none;}
.range::-moz-range-thumb{width:14px; height:14px; background:var(--accent); cursor:pointer; border:none;}

/* ===== Modal ===== */
.overlay{position:fixed; inset:0; background:rgba(20,18,15,0.42); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:48px 20px; overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--bg-elevated); border:0.5px solid var(--border-strong); width:100%; max-width:640px; margin:auto; animation:pop 200ms ease;}
.modal.wide{max-width:720px;}
@keyframes pop{from{opacity:0; transform:translateY(10px) scale(0.99);} to{opacity:1; transform:none;}}
.modal-head{display:flex; align-items:flex-start; justify-content:space-between; padding:22px 26px 16px; border-bottom:0.5px solid var(--border); gap:16px;}
.modal-head h2{font-size:18px; margin:0; color:var(--ink); font-weight:600;}
.modal-head .sub{font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; color:var(--ink-3); margin-top:7px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.x{width:30px; height:30px; flex:0 0 30px; border:none; background:transparent; color:var(--ink-3); cursor:pointer; display:flex; align-items:center; justify-content:center;}
.x:hover{color:var(--ink);}
.x svg{width:16px; height:16px;}
.modal-body{padding:8px 26px 26px; max-height:64vh; overflow-y:auto;}
.modal-foot{padding:16px 26px; border-top:0.5px solid var(--border); display:flex; gap:10px; justify-content:flex-end;}
.msec{padding:18px 0; border-bottom:0.5px solid var(--border);}
.msec:last-child{border-bottom:none;}
.jd-text{background:var(--bg-subtle); border:0.5px solid var(--border); padding:14px 16px; font-family:var(--font-mono); font-size:12.5px; line-height:1.85; color:var(--ink-2); white-space:pre-wrap;}
.match-line{display:flex; align-items:baseline; gap:9px; padding:6px 0; font-size:13.5px;}
.match-line .mk{width:14px; flex:0 0 14px; font-family:var(--font-mono);}
.match-line .ok{color:var(--status-done);}
.match-line .par{color:var(--ink-mute);}
.match-line .mt{color:var(--ink-2);}
.match-line .mt b{color:var(--ink); font-weight:600;}

/* ===== Form ===== */
.field{margin:14px 0;}
.field label{display:block; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; margin-bottom:7px;}
.input,.textarea,.select{width:100%; padding:9px 12px; background:var(--bg); border:0.5px solid var(--border-strong); color:var(--ink); font-family:var(--font-sans); font-size:14px;}
.input:focus,.textarea:focus,.select:focus{outline:none; border-color:var(--accent);}
.textarea{font-family:var(--font-mono); font-size:12.5px; line-height:1.7; resize:vertical; min-height:150px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.scoreinput{margin:13px 0;}
.scoreinput .si-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
.scoreinput .si-name{font-size:13.5px; color:var(--ink);}
.scoreinput .si-q{font-size:11.5px; color:var(--ink-3); margin-left:8px;}
.scoreinput .si-val{font-family:var(--font-mono); font-size:13px; color:var(--accent);}
.dotsrow{display:flex; gap:6px;}
.dotsrow span{width:18px; height:18px; border-radius:50%; border:1px solid var(--border-strong); cursor:pointer; transition:all 100ms ease;}
.dotsrow span.on{background:var(--accent); border-color:var(--accent);}
.dotsrow span:hover{border-color:var(--accent);}

/* ===== Toast ===== */
.toast-wrap{position:fixed; right:24px; bottom:86px; z-index:200; display:flex; flex-direction:column; gap:10px;}
.toast{background:#1A1A1A; color:#F5F0E8; padding:11px 16px 11px 14px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; box-shadow:inset 2px 0 0 var(--accent); animation:slidein 220ms ease; max-width:300px;}
html[data-theme="dark"] .toast{background:#000;}
@keyframes slidein{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:none;}}

/* ===== Empty / guide ===== */
.guide-step{padding:22px 0; border-bottom:0.5px solid var(--border); display:grid; grid-template-columns:auto 1fr; gap:22px; align-items:start;}
.guide-step .gnum{font-family:var(--font-mono); font-size:11px; letter-spacing:0.2em; color:var(--accent);}
.guide-step h3{margin:0; font-size:17px; color:var(--ink); font-weight:600;}
.guide-step p{margin:6px 0 0; color:var(--ink-3); font-size:13.5px;}

footer.sign{padding:16px 0; border-top:0.5px solid var(--border); margin-top:60px; display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; letter-spacing:0.25em; color:var(--ink-3);}

@media (max-width:1100px){
  .stat-grid{grid-template-columns:repeat(2,1fr);} .stat:nth-child(2){border-right:none;}
  .skill-grid{grid-template-columns:repeat(2,1fr);}
  .cols2{grid-template-columns:1fr;} .cols2 > div:first-child{border-right:none; border-bottom:0.5px solid var(--border);}
}
/* ===== Accrual badges (积累价值) ===== */
.acbadge{display:inline-flex; align-items:center; gap:5px; padding:2px 8px 2px 6px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; border:0.5px solid var(--border-strong);}
.acbadge::before{content:""; width:6px; height:6px; border-radius:50%;}
.ac-compound{border-color:var(--status-done); color:var(--status-done);}
.ac-compound::before{background:var(--status-done);}
.ac-accumulate{border-color:var(--status-info); color:var(--status-info);}
.ac-accumulate::before{background:var(--status-info);}
.ac-depreciate{border-color:var(--ink-mute); color:var(--ink-mute);}
.ac-depreciate::before{background:var(--ink-mute);}
.skill-card .smeta{display:flex; gap:14px; margin-top:9px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em; color:var(--ink-3);}
.skill-card .smeta b{color:var(--ink-2); font-weight:500;}
.skill-card .stop{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}

/* 积累价值 lens */
.lens{display:grid; grid-template-columns:repeat(3,1fr); gap:0; border:0.5px solid var(--border); background:var(--bg-elevated);}
.lens-col{padding:18px; border-right:0.5px solid var(--border);}
.lens-col:last-child{border-right:none;}
.lens-col .lh{display:flex; align-items:center; gap:8px;}
.lens-col .ld{font-size:12px; color:var(--ink-3); margin:9px 0 13px; min-height:48px;}
.lens-col .ll{display:flex; flex-wrap:wrap; gap:6px;}
.lens-col .invest{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.1em; color:var(--ink-mute); text-transform:uppercase; margin-top:13px;}

/* ===== Action: progress + practice ===== */
.act-top{display:flex; align-items:flex-start; justify-content:space-between; gap:14px;}
.act-prog{display:flex; align-items:center; gap:12px; margin-top:11px;}
.act-prog .bar{flex:1; max-width:240px; height:5px;}
.act-prog .pv{font-family:var(--font-mono); font-size:11px; color:var(--ink-3); white-space:nowrap;}
.act-stats{display:flex; gap:22px; margin-top:11px; flex-wrap:wrap;}
.act-stat{font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:0.04em;}
.act-stat b{font-family:var(--font-serif); font-style:normal; font-size:17px; color:var(--ink); font-weight:500; margin-right:3px;}
.act-next{font-size:12.5px; color:var(--ink-3); margin-top:10px;}
.act-next b{color:var(--ink-2); font-weight:500;}
.act-open{margin-top:12px;}

/* milestones */
.ms-row{display:flex; align-items:center; gap:11px; padding:9px 0; border-bottom:0.5px solid var(--border); font-size:13.5px; color:var(--ink-2); cursor:pointer;}
.ms-row:last-child{border-bottom:none;}
.ms-row.done span.t{text-decoration:line-through; color:var(--ink-mute);}

/* session timeline */
.slog{position:relative; margin-top:6px; padding-left:20px;}
.slog::before{content:""; position:absolute; left:4px; top:6px; bottom:6px; width:0.5px; background:var(--border-strong);}
.sitem{position:relative; padding:10px 0;}
.sitem::before{content:""; position:absolute; left:-19px; top:15px; width:7px; height:7px; border-radius:50%; background:var(--bg-elevated); border:1.5px solid var(--accent);}
.sitem .sh{display:flex; align-items:baseline; gap:12px;}
.sitem .sd{font-family:var(--font-mono); font-size:11px; color:var(--ink-2); letter-spacing:0.04em;}
.sitem .sm{font-family:var(--font-mono); font-size:10px; color:var(--accent); letter-spacing:0.06em;}
.sitem .sn{font-size:13px; color:var(--ink-2); margin-top:4px; line-height:1.6;}
.sess-form{border:0.5px solid var(--border-strong); padding:14px; margin-top:12px; background:var(--bg-subtle);}
.sess-form .field{margin:8px 0;}

/* ===== Nav groups + AI tag ===== */
.nav-group{font-family:var(--font-mono); font-size:9px; letter-spacing:0.24em; color:var(--ink-mute); text-transform:uppercase; padding:14px 10px 5px; }
.nav-item:first-child{margin-top:0;}
.ai-tag{margin-left:auto; font-family:var(--font-mono); font-size:8.5px; letter-spacing:0.12em; font-weight:600; color:var(--accent); border:0.5px solid var(--accent); padding:1px 4px; line-height:1.4;}
.nav-item.active .ai-tag{background:var(--accent); color:#fff;}
html[data-theme="dark"] .nav-item.active .ai-tag{color:#1A1A1A;}

/* ===== AI panel / blocks ===== */
.ai-panel{border:0.5px solid var(--border); background:var(--bg-elevated);}
.ai-bar{display:flex; align-items:center; gap:9px; padding:11px 16px; border-bottom:0.5px solid var(--border); background:var(--bg-subtle);}
.ai-bar .dot{width:7px; height:7px; border-radius:50%; background:var(--accent);}
.ai-bar .lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; color:var(--ink-3); text-transform:uppercase;}
.ai-bar .lbl b{color:var(--accent); font-weight:600;}
.ai-loading{display:flex; align-items:center; gap:10px; padding:22px 16px; color:var(--ink-3); font-size:13px;}
.ai-dots{display:inline-flex; gap:4px;}
.ai-dots i{width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0.3; animation:aipulse 1s infinite;}
.ai-dots i:nth-child(2){animation-delay:0.18s;} .ai-dots i:nth-child(3){animation-delay:0.36s;}
@keyframes aipulse{0%,100%{opacity:0.25;} 50%{opacity:1;}}
.ai-step{font-family:var(--font-mono); font-size:11px; color:var(--ink-3); padding:5px 0; display:flex; align-items:center; gap:8px; animation:fadestep 300ms ease;}
.ai-step .tick{color:var(--status-done);}
@keyframes fadestep{from{opacity:0; transform:translateX(-4px);} to{opacity:1;}}

/* match readout */
.score-big{display:flex; align-items:baseline; gap:6px;}
.score-big .v{font-family:var(--font-serif); font-size:46px; font-weight:500; color:var(--ink); line-height:1;}
.score-big .v.accent{color:var(--accent);}
.score-big .u{font-family:var(--font-mono); font-size:13px; color:var(--ink-3);}
.readout-grid{display:grid; grid-template-columns:1fr 1fr; gap:0; border:0.5px solid var(--border);}
.readout-grid > div{padding:20px; border-right:0.5px solid var(--border);}
.readout-grid > div:last-child{border-right:none;}
.rw-diff{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:0.5px solid var(--border);}
.rw-diff > div{background:var(--bg-elevated); padding:14px 16px;}
.rw-diff .h{font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--ink-3); text-transform:uppercase; margin-bottom:9px;}
.rw-old{color:var(--ink-mute); font-size:13px; line-height:1.7; text-decoration:line-through; text-decoration-color:var(--border-strong);}
.rw-new{color:var(--ink); font-size:13.5px; line-height:1.7;}
.rw-new b{color:var(--accent); font-weight:600;}

/* trends */
.trend-row{display:grid; grid-template-columns:96px 1fr 84px; align-items:center; gap:14px; padding:9px 0; border-bottom:0.5px solid var(--border);}
.trend-row:last-child{border-bottom:none;}
.trend-row .tn{font-size:14px; color:var(--ink); font-weight:500;}
.trend-track{height:18px; position:relative; display:flex; align-items:center;}
.trend-track .mid{position:absolute; left:50%; top:0; bottom:0; width:0.5px; background:var(--border-strong);}
.trend-track i{height:8px; position:absolute; left:50%;}
.trend-track i.up{background:var(--status-done);}
.trend-track i.down{background:var(--ink-mute); transform:translateX(-100%);}
.trend-val{font-family:var(--font-mono); font-size:12px; text-align:right;}
.trend-val.up{color:var(--status-done);} .trend-val.down{color:var(--ink-3);} .trend-val.flat{color:var(--ink-mute);}

/* salary bench */
.sal-row{display:grid; grid-template-columns:140px 1fr 90px; align-items:center; gap:16px; padding:11px 0; border-bottom:0.5px solid var(--border);}
.sal-row:last-child{border-bottom:none;}
.sal-row .sn{font-size:13.5px; color:var(--ink-2);}
.sal-bar{height:8px; background:var(--border); position:relative;}
.sal-bar i{position:absolute; top:0; bottom:0; background:var(--status-info);}
.sal-bar .you{position:absolute; top:-4px; bottom:-4px; width:1.5px; background:var(--accent);}
.sal-val{font-family:var(--font-mono); font-size:12px; color:var(--ink-2); text-align:right;}

/* interview */
.iv-msg{margin:14px 0;}
.iv-q{border-left:2px solid var(--accent); padding:4px 0 4px 14px; }
.iv-q .who{font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--accent); text-transform:uppercase;}
.iv-q .qt{font-size:15px; color:var(--ink); margin-top:6px; line-height:1.6;}
.iv-a{border-left:2px solid var(--border-strong); padding:4px 0 4px 14px; margin-top:14px;}
.iv-a .who{font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--ink-3); text-transform:uppercase;}
.iv-fb{border:0.5px solid var(--border); background:var(--bg-subtle); padding:16px; margin-top:14px;}
.iv-score{display:flex; gap:24px; margin-bottom:12px;}
.iv-score .s{font-family:var(--font-serif); font-size:24px; color:var(--ink); font-weight:500;}
.iv-fb ul{margin:8px 0 0; padding-left:18px;} .iv-fb li{font-size:13px; color:var(--ink-2); margin:5px 0; line-height:1.6;}

/* resume card */
.resume-card{border:0.5px solid var(--border); background:var(--bg-elevated); padding:18px 20px;}
.dropzone{border:1px dashed var(--border-strong); padding:30px; text-align:center; cursor:pointer; transition:border-color 150ms ease;}
.dropzone:hover{border-color:var(--accent);}
.dropzone .di{color:var(--ink-mute);}
.next-hero{border:0.5px solid var(--accent); background:var(--accent-soft);}
html[data-theme="dark"] .next-hero{background:var(--accent-soft);}
.next-hero .nh-in{padding:22px 24px;}
.pillrow{display:flex; gap:8px; flex-wrap:wrap;}
.pill{padding:7px 14px; border:0.5px solid var(--border-strong); background:transparent; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; color:var(--ink-2); cursor:pointer; transition:all 120ms ease;}
.pill:hover{border-color:var(--accent); color:var(--accent);}
.pill.on{background:var(--accent); color:#fff; border-color:var(--accent);}
html[data-theme="dark"] .pill.on{color:#1A1A1A;}

/* ===== Copilot (global AI) ===== */
.cop-launch{position:fixed; right:22px; bottom:22px; z-index:150; display:flex; align-items:center; gap:9px; padding:11px 16px; background:var(--ink); color:var(--bg-elevated); border:none; cursor:pointer; font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; box-shadow:0 2px 14px rgba(0,0,0,0.18); transition:transform 150ms ease;}
.cop-launch:hover{transform:translateY(-1px);}
.cop-launch .ld{width:7px; height:7px; border-radius:50%; background:var(--accent);}
html[data-theme="dark"] .cop-launch{background:var(--bg-elevated); color:var(--ink); border:0.5px solid var(--border-strong);}
.cop-panel{position:fixed; top:0; right:0; bottom:0; width:420px; max-width:92vw; background:var(--bg-elevated); border-left:0.5px solid var(--border-strong); z-index:160; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 240ms cubic-bezier(.4,0,.2,1); box-shadow:-8px 0 30px rgba(0,0,0,0.10);}
.cop-panel.open{transform:none;}
.cop-head{display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:0.5px solid var(--border);}
.cop-head .ld{width:8px; height:8px; border-radius:50%; background:var(--accent);}
.cop-head .ht{font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; color:var(--ink-2); text-transform:uppercase;}
.cop-head .hs{font-size:11px; color:var(--ink-mute); margin-left:2px;}
.cop-msgs{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px;}
.cop-msg{max-width:88%; font-size:13.5px; line-height:1.65;}
.cop-msg.user{align-self:flex-end; background:var(--accent-soft); color:var(--ink); padding:9px 13px; border:0.5px solid var(--border);}
.cop-msg.ai{align-self:flex-start; color:var(--ink-2);}
.cop-msg.ai .who{font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; color:var(--accent); text-transform:uppercase; display:block; margin-bottom:5px;}
/* AI 气泡内 Markdown 渲染元素(沿用设计 token,不自创视觉) */
.cop-msg.ai h1,.cop-msg.ai h2,.cop-msg.ai h3,.cop-msg.ai h4,.cop-msg.ai h5,.cop-msg.ai h6{font-weight:600; color:var(--ink); line-height:1.35; margin:13px 0 6px;}
.cop-msg.ai h1{font-size:16.5px;} .cop-msg.ai h2{font-size:15px;} .cop-msg.ai h3{font-size:13.8px;}
.cop-msg.ai h4,.cop-msg.ai h5,.cop-msg.ai h6{font-size:13px;}
.cop-msg.ai .ai-stream>:first-child,.cop-msg.ai>.who+*{margin-top:0;}
.cop-msg.ai p{margin:7px 0;}
.cop-msg.ai ul,.cop-msg.ai ol{margin:7px 0; padding-left:20px;}
.cop-msg.ai li{margin:3px 0;}
.cop-msg.ai code{font-family:var(--font-mono); font-size:12px; background:var(--bg-subtle); border:0.5px solid var(--border); border-radius:3px; padding:1px 5px;}
.cop-msg.ai pre{background:var(--bg-subtle); border:0.5px solid var(--border); padding:11px 13px; margin:9px 0; overflow-x:auto;}
.cop-msg.ai pre code{background:none; border:none; padding:0; font-size:12px; line-height:1.55;}
.cop-msg.ai blockquote{border-left:2px solid var(--accent); margin:8px 0; padding:2px 0 2px 12px; color:var(--ink-3);}
.cop-msg.ai a{color:var(--accent); text-decoration:underline;}
.cop-msg.ai hr{border:none; border-top:0.5px solid var(--border); margin:12px 0;}
.cop-msg.ai strong{font-weight:600; color:var(--ink);}
.cop-msg.ai em{font-style:italic;}
.cop-msg.ai table{border-collapse:collapse; margin:10px 0; font-size:12.5px; display:block; overflow-x:auto;}
.cop-msg.ai th,.cop-msg.ai td{border:0.5px solid var(--border); padding:6px 11px; text-align:left; vertical-align:top;}
.cop-msg.ai th{background:var(--bg-subtle); font-weight:600; color:var(--ink); white-space:nowrap;}
/* 智能匹配交互卡(原生 domain · 沿用设计 token,不自创视觉) */
.match-card{padding:0; overflow:hidden;}
.match-card .mc-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:13px 15px 9px;}
.match-card .mc-co{font-size:14px; font-weight:600; color:var(--ink); line-height:1.35;}
.match-card .mc-sub{font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; color:var(--ink-3); margin-top:4px; text-transform:uppercase;}
.match-card .mc-score{display:flex; align-items:baseline; gap:2px; flex-shrink:0;}
.match-card .mc-score .v{font-family:var(--font-serif); font-size:30px; font-weight:500; color:var(--accent); line-height:1;}
.match-card .mc-score .u{font-size:11px; color:var(--ink-3);}
.match-card .mc-bar{height:5px; background:var(--bg-subtle); margin:0 15px;}
.match-card .mc-bar i{display:block; height:100%; background:var(--accent);}
.match-card .mc-body{display:flex; gap:10px; align-items:center; padding:12px 15px 4px; flex-wrap:wrap;}
.match-card .mc-radar{flex-shrink:0;}
.match-card .mc-radar svg{display:block;}
.match-card .mc-gaps{flex:1; min-width:130px;}
.match-card .mc-lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:var(--ink-3); text-transform:uppercase; margin-bottom:7px;}
.match-card .mc-chips{display:flex; flex-wrap:wrap; gap:5px;}
.match-card .mc-acts{padding:4px 15px 14px;}
/* 训练计划交互卡(原生 domain · 沿用设计 token) */
.plan-card{padding:0;}
.plan-card .pc-head{display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:13px 15px 4px; flex-wrap:wrap;}
.plan-card .pc-title{font-size:14px; font-weight:600; color:var(--ink);}
.plan-card .pc-badge{font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; color:var(--accent); white-space:nowrap;}
.plan-card .pc-timeline{padding:8px 15px 4px;}
.plan-card .pc-step{display:flex; gap:11px; align-items:flex-start; padding:7px 0; border-bottom:0.5px solid var(--border);}
.plan-card .pc-step:last-child{border-bottom:none;}
.plan-card .pc-idx{font-family:var(--font-mono); font-size:11px; color:var(--accent); flex-shrink:0; padding-top:1px;}
.plan-card .pc-ms{font-size:13px; color:var(--ink-2); line-height:1.5;}
.plan-card .pc-res{padding:8px 15px 2px;}
.plan-card .pc-lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); margin-bottom:7px;}
.plan-card .pc-chips{display:flex; flex-wrap:wrap; gap:5px;}
.plan-card .pc-acts{padding:8px 15px 14px;}
/* 面试题交互卡 */
.iv-card{padding:0;}
.iv-card .iv-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:13px 15px 6px;flex-wrap:wrap;}
.iv-card .iv-title{font-size:14px;font-weight:600;color:var(--ink);}
.iv-card .iv-badge{font-family:var(--font-mono);font-size:10px;color:var(--accent);white-space:nowrap;}
.iv-card .iv-list{padding:4px 15px;}
.iv-card .iv-q{padding:9px 0;border-bottom:0.5px solid var(--border);}
.iv-card .iv-q:last-child{border-bottom:none;}
.iv-card .iv-qtop{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.iv-card .iv-idx{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
.iv-card .iv-cat{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);background:var(--bg-subtle);border:0.5px solid var(--border);padding:1px 6px;}
.iv-card .iv-qt{font-size:13px;color:var(--ink-2);line-height:1.55;}
.iv-card .iv-acts{padding:8px 15px 14px;}
/* 市场价值交互卡 */
.value-card{padding:0;}
.value-card .vc-head{padding:14px 15px 10px;border-bottom:0.5px solid var(--border);}
.value-card .vc-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
.value-card .vc-num{display:flex;align-items:baseline;gap:4px;margin:4px 0 2px;}
.value-card .vc-num .v{font-family:var(--font-serif);font-size:32px;font-weight:500;color:var(--accent);line-height:1;}
.value-card .vc-num .u{font-size:12px;color:var(--ink-3);}
.value-card .vc-band{font-size:12.5px;color:var(--ink-3);}
.value-card .vc-moves{padding:11px 15px 4px;}
.value-card .vc-mlbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
.value-card .vc-move{display:flex;align-items:flex-start;gap:9px;padding:4px 0;font-size:13px;color:var(--ink-2);line-height:1.5;}
.value-card .vc-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0;}
.value-card .vc-acts{padding:8px 15px 14px;}
/* 能力缺口交互卡 */
.gaps-card{padding:0;}
.gaps-card .gc-head{padding:13px 15px 4px;}
.gaps-card .gc-title{font-size:14px;font-weight:600;color:var(--ink);}
.gaps-card .gc-list{padding:4px 15px;}
.gaps-card .gc-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.gaps-card .gc-row:last-child{border-bottom:none;}
.gaps-card .gc-skill{font-size:13.5px;color:var(--ink);font-weight:500;flex:1;}
.gaps-card .gc-meta{display:flex;gap:10px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);white-space:nowrap;}
.gaps-card .gc-jobs{color:var(--accent);}
.gaps-card .gc-acts{padding:8px 15px 14px;}
/* 下一步轻卡 */
.next-card{padding:14px 15px;}
.next-card .nx-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:7px;}
.next-card .nx-title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.4;}
.next-card .nx-goal{font-size:12.5px;color:var(--ink-3);line-height:1.6;margin-top:5px;}
.next-card .nx-acts{margin-top:11px;padding:0;}
/* 模型多选 chips(数据设置 · 一协议多模型) */
.md-models{display:flex;flex-wrap:wrap;gap:6px;}
.md-model{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border:0.5px solid var(--border);font-size:12.5px;color:var(--ink-2);cursor:pointer;background:var(--bg);}
.md-model.on{border-color:var(--accent);color:var(--accent);}
.md-model .md-x{border:none;background:none;color:var(--ink-mute);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 3px;}
.md-model .md-x:hover{color:var(--accent);}
.cop-card{border:0.5px solid var(--border); background:var(--bg); margin-top:10px; padding:14px;}
.cop-card .cct{font-size:13px; color:var(--ink); font-weight:500;}
.cop-card .ccm{font-size:12px; color:var(--ink-3); margin-top:4px; line-height:1.6;}
.cop-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:11px;}
.cop-actions .btn{padding:6px 12px; font-size:10px;}
.cop-think{display:flex; align-items:center; gap:9px; color:var(--ink-3); font-size:12.5px; align-self:flex-start;}
.cop-sugg{display:flex; flex-direction:column; gap:7px; margin-top:4px;}
.cop-sugg button{text-align:left; padding:9px 12px; border:0.5px solid var(--border); background:var(--bg); color:var(--ink-2); font-size:12.5px; cursor:pointer; transition:all 120ms ease;}
.cop-sugg button:hover{border-color:var(--accent); color:var(--accent);}
.cop-input{border-top:0.5px solid var(--border); padding:12px; display:flex; gap:8px; align-items:flex-end;}
.cop-input textarea{flex:1; resize:none; border:0.5px solid var(--border-strong); background:var(--bg); color:var(--ink); font-family:var(--font-sans); font-size:13.5px; padding:9px 11px; max-height:120px; min-height:40px; line-height:1.5;}
.cop-input textarea:focus{outline:none; border-color:var(--accent);}
.cop-send{flex:0 0 40px; height:40px; border:none; background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;}
html[data-theme="dark"] .cop-send{color:#1A1A1A;}
.cop-send svg{width:17px; height:17px;}
.cop-send:disabled{opacity:0.4; cursor:default;}

/* ===== Interview bank / practice / records ===== */
.q-row{display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; padding:14px 2px; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background 100ms ease;}
.q-row:hover{background:var(--bg-subtle);}
.q-cat{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.12em; color:var(--ink-3); border:0.5px solid var(--border-strong); padding:2px 7px; white-space:nowrap;}
.q-cat.ai{color:var(--accent); border-color:var(--accent);}
.q-text{font-size:14px; color:var(--ink); line-height:1.55;}
.q-tags{font-family:var(--font-mono); font-size:10px; color:var(--ink-mute); margin-top:4px; letter-spacing:0.04em;}
.q-src{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.1em; color:var(--ink-mute); white-space:nowrap;}
.q-go{color:var(--accent); font-family:var(--font-mono); font-size:11px; white-space:nowrap;}
.iv-toolbar{display:flex; gap:8px 16px; align-items:center; flex-wrap:wrap; padding:14px 0;}
.iv-search{flex:1; min-width:160px; max-width:300px; padding:7px 11px; background:var(--bg); border:0.5px solid var(--border-strong); color:var(--ink); font-family:var(--font-sans); font-size:13px;}
.iv-search:focus{outline:none; border-color:var(--accent);}
.mic-btn{display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border:0.5px solid var(--border-strong); background:transparent; color:var(--ink-2); font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; cursor:pointer; transition:all 150ms ease;}
.mic-btn:hover{border-color:var(--accent); color:var(--accent);}
.mic-btn.rec{border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
.mic-btn .mdot{width:8px; height:8px; border-radius:50%; background:var(--ink-mute);}
.mic-btn.rec .mdot{background:var(--accent); animation:micpulse 1s infinite;}
@keyframes micpulse{0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(1.4);}}
.dimrow{display:grid; grid-template-columns:64px 1fr 40px; align-items:center; gap:12px; margin:8px 0;}
.dimrow .dl{font-size:12.5px; color:var(--ink-2);}
.dimrow .dt{height:6px; background:var(--border); position:relative;}
.dimrow .dt i{position:absolute; left:0; top:0; bottom:0; background:var(--accent);}
.dimrow .dv{font-family:var(--font-mono); font-size:12px; color:var(--ink-3); text-align:right;}
.rec-row{border:0.5px solid var(--border); background:var(--bg-elevated); padding:15px 17px; margin-bottom:11px; cursor:pointer; transition:box-shadow 150ms ease;}
.rec-row:hover{box-shadow:inset 2px 0 0 var(--accent);}
.rec-top{display:flex; justify-content:space-between; align-items:baseline; gap:14px;}
.rec-q{font-size:14px; color:var(--ink); font-weight:500; line-height:1.5;}
.rec-meta{font-family:var(--font-mono); font-size:11px; color:var(--ink-3); white-space:nowrap;}
.rec-sc{display:flex; gap:16px; margin-top:9px;}
.rec-sc span{font-family:var(--font-mono); font-size:11px; color:var(--ink-3);}
.rec-sc b{font-family:var(--font-serif); font-style:normal; font-size:15px; color:var(--ink); font-weight:500; margin-right:3px;}

/* ===== Tailored resume builder ===== */
.rb-card{border:0.5px solid var(--border); background:var(--bg-elevated); padding:18px 20px;}
.rb-sec{margin-bottom:15px;}
.rb-sec:last-child{margin-bottom:0;}
.rb-label{font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:8px;}
.rb-ta{width:100%; border:0.5px solid var(--border); background:var(--bg); color:var(--ink); font-family:var(--font-sans); font-size:13.5px; line-height:1.65; padding:8px 11px; resize:vertical;}
.rb-ta:focus{outline:none; border-color:var(--accent);}
.rb-proj{display:flex; gap:10px; align-items:flex-start; margin-bottom:8px;}
.rb-proj .rb-ta{flex:1; min-height:46px;}
.rb-proj.star .rb-ta{box-shadow:inset 2px 0 0 var(--accent);}
.rb-tools{display:flex; flex-direction:column; gap:5px; flex:0 0 auto;}
.rb-ic{width:30px; height:28px; border:0.5px solid var(--border-strong); background:transparent; color:var(--ink-3); cursor:pointer; font-family:var(--font-mono); font-size:11px; display:flex; align-items:center; justify-content:center; transition:all 120ms ease;}
.rb-ic:hover{border-color:var(--accent); color:var(--accent);}
.rb-ic.on{background:var(--accent); color:#fff; border-color:var(--accent);}
html[data-theme="dark"] .rb-ic.on{color:#1A1A1A;}
.rb-skill-in{width:100%; border:0.5px solid var(--border); background:var(--bg); color:var(--ink); font-family:var(--font-mono); font-size:12px; padding:8px 11px;}
.rb-skill-in:focus{outline:none; border-color:var(--accent);}
.style-line{display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:13px 16px; border:0.5px solid var(--border); background:var(--bg-subtle); margin-top:14px;}
.style-line .sl-co{font-size:13px; color:var(--ink); font-weight:600;}
.style-line .sl-note{font-size:12.5px; color:var(--ink-3); flex:1; min-width:160px;}

/* ===== Modular resume blocks ===== */
.res-layout{display:grid; grid-template-columns:236px 1fr; gap:18px; align-items:start;}
.mod-pick{border:0.5px solid var(--border); background:var(--bg-elevated);}
.mod-pick .mp-head{font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; color:var(--ink-3); text-transform:uppercase; padding:13px 14px 10px; border-bottom:0.5px solid var(--border);}
.mod-row{display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:0.5px solid var(--border);}
.mod-row:last-of-type{border-bottom:none;}
.mod-row .mlabel{flex:1; font-size:13px; color:var(--ink); display:flex; align-items:center; gap:7px;}
.mod-row.off .mlabel{color:var(--ink-mute);}
.mod-row .mlock{font-family:var(--font-mono); font-size:8.5px; letter-spacing:0.08em; color:var(--ink-mute);}
.tgl{width:34px; height:18px; border-radius:9px; background:var(--border-strong); position:relative; cursor:pointer; transition:background 160ms ease; flex:0 0 34px;}
.tgl.on{background:var(--accent);}
.tgl::after{content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition:left 160ms ease;}
.tgl.on::after{left:18px;}
.tgl.locked{opacity:0.5; cursor:not-allowed;}
.mp-add{width:100%; padding:11px; border:none; border-top:0.5px solid var(--border); background:transparent; color:var(--accent); font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; cursor:pointer;}
.mp-add:hover{background:var(--accent-soft);}
.blk{border:0.5px solid var(--border); margin-bottom:12px; background:var(--bg-elevated);}
.blk-head{display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer;}
.blk-head .chev{color:var(--ink-3); transition:transform 160ms ease; flex:0 0 auto; display:inline-flex;}
.blk.open .blk-head .chev{transform:rotate(90deg);}
.blk-title{font-size:14.5px; font-weight:600; color:var(--ink);}
.blk-tag{font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; color:var(--ink-mute); border:0.5px solid var(--border-strong); padding:1px 6px; margin-left:auto; white-space:nowrap;}
.blk-tag.lock{color:var(--status-info); border-color:var(--status-info);}
.blk-del{border:none;background:transparent;color:var(--ink-mute);cursor:pointer;font-family:var(--font-mono);font-size:13px;padding:0 2px;}
.blk-del:hover{color:var(--accent);}
.blk-body{padding:2px 16px 16px; display:none;}
.blk.open .blk-body{display:block;}
.lockfield{display:grid; grid-template-columns:84px 1fr; gap:8px 14px; align-items:center; padding:8px 0;}
.lockfield .lk{font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; color:var(--ink-3);}
.lockfield .lv{font-size:13.5px; color:var(--ink-2);}
.lock-note{font-size:11.5px; color:var(--ink-mute); margin-top:10px; line-height:1.6; display:flex; gap:7px; align-items:flex-start;}
.lock-note .li{color:var(--status-info); flex:0 0 auto;}
@media (max-width:980px){.res-layout{grid-template-columns:1fr;}}

/* ===== Resume preview templates (premium) ===== */
.resume-paper{background:#fff; color:#1d1d1f; max-width:760px; margin:0 auto; border:1px solid #ece9e3; box-shadow:0 10px 40px rgba(20,18,15,0.10); -webkit-font-smoothing:antialiased;}
.resume-paper *{box-sizing:border-box;}
.rp-list{margin:6px 0 0; padding-left:0; list-style:none;}
.rp-list li{position:relative; padding-left:14px; margin:5px 0; color:#3a3a3a; font-size:12.5px; line-height:1.62;}
.rp-list li::before{content:""; position:absolute; left:2px; top:8px; width:3px; height:3px; border-radius:50%; background:#bdb8b0;}
.rp-entry{margin-bottom:14px;}
.rp-entry:last-child{margin-bottom:0;}
.rp-erow{display:flex; justify-content:space-between; align-items:baseline; gap:14px;}
.rp-org{font-size:14px; font-weight:600; color:#1d1d1f;}
.rp-date{font-size:11px; color:#8a847a; font-family:var(--font-mono); white-space:nowrap; letter-spacing:0.02em;}
.rp-esub{display:flex; justify-content:space-between; gap:14px; margin-top:2px;}
.rp-role2{font-size:12.5px; color:#5a5550;}
.rp-loc{font-size:11px; color:#8a847a; font-family:var(--font-mono);}
.rp-text{font-size:12.5px; color:#3a3a3a; line-height:1.7;}
.rstar{color:#C95F3D;}
/* minimal */
.rt-minimal{font-family:var(--font-sans); padding:54px 56px;}
.rt-minimal .rp-head{margin-bottom:26px;}
.rt-minimal .rp-name{font-size:30px; font-weight:700; letter-spacing:-0.02em; margin:0;}
.rt-minimal .rp-role{font-size:13.5px; color:#C95F3D; font-weight:500; margin:6px 0 0;}
.rt-minimal .rp-contact{font-family:var(--font-mono); font-size:11px; color:#8a847a; margin:12px 0 0; letter-spacing:0.02em;}
.rt-minimal .rp-sec{margin-bottom:22px;}
.rt-minimal .rp-title{font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color:#9a948b; margin:0 0 12px; padding-bottom:7px; border-bottom:1px solid #ece9e3;}
.rt-minimal .rp-skills{display:flex; flex-wrap:wrap; gap:7px;}
.rt-minimal .rp-skills span{border:1px solid #e0ddd6; border-radius:3px; padding:3px 9px; font-size:11.5px; color:#5a5550;}
/* classic */
.rt-classic{font-family:var(--font-sans); padding:52px 58px; color:#222;}
.rt-classic .rp-head{text-align:center; padding-bottom:16px; border-bottom:1px solid #cfcabf; margin-bottom:24px;}
.rt-classic .rp-name{font-family:var(--font-serif); font-size:33px; font-weight:600; letter-spacing:0.06em; margin:0;}
.rt-classic .rp-role{font-size:13px; color:#555; margin:7px 0 0; font-style:italic; font-family:var(--font-serif);}
.rt-classic .rp-contact{font-size:11.5px; color:#777; margin:10px 0 0; letter-spacing:0.04em;}
.rt-classic .rp-sec{margin-bottom:20px;}
.rt-classic .rp-title{font-family:var(--font-serif); font-size:13px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#1d1d1f; text-align:center; margin:0 0 13px;}
.rt-classic .rp-title::after{content:""; display:block; width:32px; height:2px; background:#C95F3D; margin:7px auto 0;}
.rt-classic .rp-skills{text-align:center; font-size:12.5px; color:#444;}
.rt-classic .rp-skills span:not(:last-child)::after{content:"  ·  "; color:#bbb;}
/* sidebar */
.rt-sidebar{font-family:var(--font-sans); overflow:hidden;}
.rt-sidebar .rp-grid{display:grid; grid-template-columns:236px 1fr;}
.rt-sidebar .rp-aside{background:#22252b; color:#cfd2d6; padding:42px 26px;}
.rt-sidebar .rp-main{padding:42px 40px;}
.rt-sidebar .rp-name{font-size:23px; font-weight:700; color:#fff; margin:0; line-height:1.18; letter-spacing:-0.01em;}
.rt-sidebar .rp-role{font-size:12px; color:#cfa595; margin:6px 0 16px;}
.rt-sidebar .rp-contact{font-family:var(--font-mono); font-size:10.5px; color:#9aa0a8; line-height:2.05; word-break:break-all;}
.rt-sidebar .rp-aside .rp-title{font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.22em; text-transform:uppercase; color:#7f8895; margin:22px 0 10px;}
.rt-sidebar .rp-aside .rp-skills{display:flex; flex-direction:column; gap:6px;}
.rt-sidebar .rp-aside .rp-skills span{font-size:12px; color:#d5d8dc;}
.rt-sidebar .rp-aside .rp-org{color:#eceef0; font-size:13px;}
.rt-sidebar .rp-aside .rp-date,.rt-sidebar .rp-aside .rp-loc{color:#8b929b;}
.rt-sidebar .rp-aside .rp-role2{color:#aab0b8;}
.rt-sidebar .rp-aside .rp-list li{color:#aab0b8;}
.rt-sidebar .rp-aside .rp-list li::before{background:#5d646e;}
.rt-sidebar .rp-main .rp-title{font-size:11px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#C95F3D; margin:0 0 12px;}
.rt-sidebar .rp-main .rp-sec{margin-bottom:22px;}
/* editorial */
.rt-editorial{font-family:var(--font-sans); padding:50px 56px;}
.rt-editorial .rp-head{margin-bottom:22px;}
.rt-editorial .rp-name{font-family:var(--font-serif); font-style:italic; font-weight:500; font-size:46px; margin:0; line-height:0.98; letter-spacing:-0.01em;}
.rt-editorial .rp-name::after{content:"."; color:#C95F3D; font-style:normal;}
.rt-editorial .rp-role{font-family:var(--font-mono); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C95F3D; margin:14px 0 0;}
.rt-editorial .rp-contact{font-family:var(--font-mono); font-size:11px; color:#8a847a; margin:7px 0 0;}
.rt-editorial .rp-body{border-top:3px solid #1d1d1f; padding-top:20px;}
.rt-editorial .rp-sec{display:grid; grid-template-columns:128px 1fr; gap:18px; margin-bottom:22px;}
.rt-editorial .rp-title{font-family:var(--font-serif); font-style:italic; font-size:19px; color:#1d1d1f; margin:0; line-height:1.2;}
.rt-editorial .rp-secbody{min-width:0;}
.rt-editorial .rp-skills{display:flex; flex-wrap:wrap; gap:7px;}
.rt-editorial .rp-skills span{font-family:var(--font-mono); font-size:11px; color:#3a3a3a; border-bottom:1.5px solid #C95F3D; padding-bottom:1px;}
@media (max-width:640px){ .rt-editorial .rp-sec{grid-template-columns:1fr; gap:6px;} }
@media (max-width:720px){ .rt-sidebar .rp-grid{grid-template-columns:1fr;} }
/* entry editor */
.rb-entry{border:0.5px solid var(--border); padding:12px; margin-bottom:10px; background:var(--bg);}
.rb-entry.star{box-shadow:inset 2px 0 0 var(--accent);}
.rb-erow{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
.rb-in{width:100%; border:0.5px solid var(--border-strong); background:var(--bg-elevated); color:var(--ink); font-family:var(--font-sans); font-size:13px; padding:7px 10px;}
.rb-in:focus{outline:none; border-color:var(--accent);}
@media (max-width:640px){ .rb-erow{grid-template-columns:1fr;} }
/* print */
#printRoot{display:none;}
@media print{
  body.printing > *{display:none !important;}
  body.printing #printRoot{display:block !important;}
  #printRoot .resume-paper{box-shadow:none; border:none; max-width:none;}
  @page{margin:12mm;}
}

/* ===== Sidebar (persistent, collapsible, resizable) ===== */
.sidebar{width:var(--sb-w,212px); flex:0 0 var(--sb-w,212px);}
.brand-row{display:flex; align-items:center; justify-content:space-between; padding:18px 16px 2px;}
.brand-row .brand{padding:0;}
.sb-collapse,.sb-expand{border:none; background:transparent; color:var(--ink-3); cursor:pointer; font-family:var(--font-mono); font-size:15px; line-height:1; padding:2px 6px;}
.sb-collapse:hover,.sb-expand:hover{color:var(--accent);}
.sb-expand{display:none; margin-right:8px;}
body[data-sidebar="collapsed"] .sidebar{display:none;}
body[data-sidebar="collapsed"] .sb-expand{display:inline-flex;}
.nav-abbr{display:none; font-size:13px; color:var(--ink-2);}
/* collapsed → icon/abbr rail (sidebar stays visible) */
body[data-sidebar="rail"] .sidebar{width:60px; flex:0 0 60px;}
body[data-sidebar="rail"] .brand{display:none;}
body[data-sidebar="rail"] .brand-row{justify-content:center; padding:14px 0 2px;}
body[data-sidebar="rail"] .mode-switch{flex-direction:column; margin:8px 8px 10px;}
body[data-sidebar="rail"] .mode-switch button{border-right:none; border-bottom:0.5px solid var(--border-strong); font-size:9px; padding:6px 0;}
body[data-sidebar="rail"] .mode-switch button:last-child{border-bottom:none;}
body[data-sidebar="rail"] .nav{padding:4px 6px;}
body[data-sidebar="rail"] .nav-group{text-align:center; font-size:8px; padding:11px 0 4px; letter-spacing:0.1em;}
body[data-sidebar="rail"] .nav-item{justify-content:center; padding:10px 0;}
body[data-sidebar="rail"] .nav-label,
body[data-sidebar="rail"] .nav-item .count,
body[data-sidebar="rail"] .nav-item .ai-tag,
body[data-sidebar="rail"] .nav-item .marker{display:none;}
body[data-sidebar="rail"] .nav-abbr{display:block;}
body[data-sidebar="rail"] .nav-item.active .nav-abbr{color:var(--accent);}
body[data-sidebar="rail"] .sidebar-foot{flex-direction:column; gap:8px; align-items:center;}
body[data-sidebar="rail"] .ver{display:none;}
.sb-resize{position:absolute; top:0; right:-3px; width:6px; height:100%; cursor:col-resize; z-index:6;}
.sidebar-foot{display:flex; align-items:center; gap:8px;}
.foot-ic{width:30px; height:30px;}
.mode-switch{display:flex; margin:8px 12px 10px; border:0.5px solid var(--border-strong);}
.mode-switch button{flex:1; text-align:center; padding:7px 0; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.1em; background:transparent; border:none; border-right:0.5px solid var(--border-strong); color:var(--ink-3); cursor:pointer;}
.mode-switch button:last-child{border-right:none;}
.mode-switch button.on{background:var(--accent-soft); color:var(--accent);}
/* ===== Agent pane (inside main body) ===== */
.main-body{flex:1; display:flex; min-height:0; min-width:0;}
.agent-chat{display:none; flex:0 1 420px; min-width:0; border-right:0.5px solid var(--border); background:var(--bg-subtle); flex-direction:column; overflow:hidden; transition:background 280ms ease;}
body[data-appmode="agent"] .agent-chat{display:flex;}
body[data-appmode="agent"] .cop-launch{display:none;}
.agent-head{padding:18px 20px 14px; border-bottom:0.5px solid var(--border);}
.agent-head .ah-t{font-family:var(--font-mono); font-size:12px; letter-spacing:0.24em; color:var(--ink); display:flex; align-items:center; gap:8px;}
.agent-head .ah-t .ld{width:8px; height:8px; border-radius:50%; background:var(--accent);}
.agent-head .ah-s{font-size:11.5px; color:var(--ink-3); margin-top:6px; line-height:1.5;}
.agent-chat .cop-msgs{flex:1;}
.agent-cmds{display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding:10px 14px; border-top:0.5px solid var(--border);}
.agent-cmds .ac-label{font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; color:var(--ink-mute); text-transform:uppercase; width:100%; margin-bottom:2px;}
.ac-chip{padding:5px 10px; border:0.5px solid var(--border-strong); background:var(--bg-elevated); color:var(--ink-2); font-size:12px; cursor:pointer; transition:all 120ms ease;}
.ac-chip:hover{border-color:var(--accent); color:var(--accent);}
.cmd-pop{display:none; position:absolute; left:12px; right:12px; bottom:calc(100% + 6px); background:var(--bg-elevated); border:0.5px solid var(--border-strong); box-shadow:0 -8px 24px rgba(20,18,15,0.12); max-height:300px; overflow-y:auto; z-index:30;}
.cmd-pop.open{display:block;}
.cmd-hint{font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; color:var(--ink-mute); padding:8px 13px; border-bottom:0.5px solid var(--border); text-transform:uppercase; position:sticky; top:0; background:var(--bg-elevated);}
.cmd-row{display:flex; align-items:baseline; gap:10px; padding:9px 13px; cursor:pointer; border-bottom:0.5px solid var(--border);}
.cmd-row:last-child{border-bottom:none;}
.cmd-row.active{background:var(--accent-soft);}
.cmd-row .cc{font-family:var(--font-mono); font-size:12px; color:var(--accent); min-width:90px;}
.cmd-row .cl{font-size:13px; color:var(--ink);}
.cmd-row .cd{font-size:11.5px; color:var(--ink-3); margin-left:auto; white-space:nowrap;}
.toast-undo{margin-left:auto; background:transparent; border:0.5px solid var(--accent); color:var(--accent); font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; padding:3px 9px; cursor:pointer;}
.toast-undo:hover{background:var(--accent); color:#1A1A1A;}
.ah-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
#agentCanvasToggle{border:0.5px solid var(--border-strong); background:transparent; color:var(--ink-3); font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; padding:4px 9px; cursor:pointer;}
#agentCanvasToggle:hover{border-color:var(--accent); color:var(--accent);}
/* centered (fullscreen chat) ⇄ split (chat + canvas) — content is the canvas; instant swap */
body[data-appmode="agent"][data-agent="centered"] .agent-chat{flex-grow:1; border-right:none; background:var(--bg);}
body[data-appmode="agent"][data-agent="centered"] .agent-head,
body[data-appmode="agent"][data-agent="centered"] .agent-chat .cop-msgs,
body[data-appmode="agent"][data-agent="centered"] .agent-chat .agent-cmds,
body[data-appmode="agent"][data-agent="centered"] .agent-chat .cop-input{max-width:760px; margin-left:auto; margin-right:auto; width:100%;}
body[data-appmode="agent"][data-agent="centered"] #content{display:none;}
body[data-appmode="agent"][data-agent="centered"] #agentCanvasToggle{display:none;}
body[data-appmode="agent"][data-agent="split"] .agent-chat{flex-grow:0;}
@media (max-width:900px){ .agent-chat{flex-basis:340px;} }

.hide{display:none !important;}

/* ===== 快捷键帮助浮层(Mod+/)· 复用设计 token,不自创视觉 ===== */
.ks-wrap{display:flex; flex-direction:column; gap:20px;}
.ks-gh{font-family:var(--font-mono); font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-3); margin:0 0 4px;}
.ks-row{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:8px 0; border-bottom:0.5px solid var(--border);}
.ks-row:last-child{border-bottom:none;}

.kbd{font-family:var(--font-mono); font-size:11px; color:var(--ink); background:var(--bg-subtle); border:0.5px solid var(--border-strong); border-radius:3px; padding:3px 8px; white-space:nowrap; letter-spacing:0.04em;}

/* ============ TOAST ============ */
let lastUndo=null; /* 最近一次可撤销操作(供 Mod+Z);仅 toastUndo 类操作登记 */
function toast(msg){
  const t=el(`<div class="toast">${msg}</div>`);
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity 300ms';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2800);
}
function toastUndo(msg, restoreFn){
  const t=el(`<div class="toast" style="display:flex;align-items:center;gap:14px;">${msg}<button class="toast-undo">撤销</button></div>`);
  $('#toasts').appendChild(t);
  let gone=false; const close=()=>{if(gone)return;gone=true;t.style.transition='opacity 300ms';t.style.opacity='0';setTimeout(()=>t.remove(),300);};
  const doUndo=()=>{close();restoreFn();toast('已撤销');if(lastUndo===doUndo)lastUndo=null;};
  lastUndo=doUndo;                       /* 登记为「最近可撤销」,Mod+Z 触发 */
  $('.toast-undo',t).onclick=doUndo;
  setTimeout(()=>{close();if(lastUndo===doUndo)lastUndo=null;},6500);
}
