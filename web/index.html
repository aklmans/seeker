      <div class="msec"><p class="seclabel">— SUGGESTION</p><h3 class="sectitle" style="font-size:16px;margin-bottom:8px;">${tt('可补充方向','Suggested focus')}<span class="dot">.</span></h3>
        <p style="font-size:14px;color:var(--ink);margin:0;font-weight:500;">${tt(gapSkill+' 实战经验',gapSkill+' hands-on experience')}</p>
        <p style="font-size:13px;color:var(--ink-3);margin:6px 0 12px;">${tt('可补充: 在训练项目中加入 '+gapSkill+' 的生产实践,沉淀为可展示证据。','Add '+gapSkill+' to a training project as production practice, and turn it into demonstrable evidence.')}</p>
        <button class="btn-text" id="addToActions">${tt('一键加入行动清单','Add to action list')} →</button>
      </div>
      <div class="msec" style="border-bottom:none;"><p class="seclabel">— STATUS</p><h3 class="sectitle" style="font-size:16px;margin-bottom:10px;">${tt('状态','Status')}<span class="dot">.</span></h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${statusBtns}</div></div>
    </div>`;
  const m=openModal(html);
  $('#addToActions',m).onclick=()=>{genPlanFromGap(gapSkill, j.co+' · '+j.role.split('·')[0].trim());renderActions();renderOverview();closeModal();toast('已生成训练计划: 补齐 '+gapSkill);go('actions');};
  $('#aiResume',m).onclick=()=>aiResumeForJob(j.id);
  $('#aiPlan',m).onclick=()=>{genPlanFromGap(gapSkill, j.co+' · '+j.role.split('·')[0].trim());renderActions();renderOverview();closeModal();toast('已生成「'+gapSkill+'」训练计划');go('actions');};
  $('#aiIv',m).onclick=()=>goInterview(j.id);
  $$('[data-setstatus]',m).forEach(b=>b.onclick=()=>{j.status=b.dataset.setstatus;toast('状态已更新: '+STATUS[j.status].label);closeModal();renderJobs();renderOverview();});
}
</script>
<script>
/* ---------- ANALYSIS ---------- */
function renderAnalysis(){
  const top=[...SKILLS].filter(s=>s.cat==='tech').sort((a,b)=>b.demand-a.demand).slice(0,10);
  const skillRows=top.map((s,i)=>{
    const occ=s.demand+Math.round(s.demand*0.6);
    return `<tr style="cursor:default;">
      <td class="idx">${String(i+1).padStart(2,'0')}</td>
      <td><span class="co" style="font-weight:500;">${s.name}</span></td>
      <td class="mono" style="font-size:12px;color:var(--ink-2);">${occ} 次</td>
      <td class="mono" style="font-size:12px;color:var(--ink-3);">${s.demand}/12</td>
      <td>${dotsHTML(s.lvl,'lvl')}</td>
    </tr>`;
  }).join('');
  const skillTable=`<div class="sec"><p class="seclabel">— TOP SKILLS</p><h2 class="sectitle">${tt('高频技能','High-frequency skills')}<span class="dot">.</span></h2>
    <p style="font-size:12px;color:var(--ink-3);margin:6px 0 16px;">基于 12 个岗位 JD 抽取 · 按需求频次排序</p>
    <div style="border:0.5px solid var(--border);"><table>
      <thead><tr><th style="width:44px;">排名</th><th>技能</th><th>出现次数</th><th>覆盖岗位</th><th>你的掌握</th></tr></thead>
      <tbody>${skillRows}</tbody></table></div></div>`;

  const matCompanies=JOBS.slice(0,8);
  const matSkills=['Go','MySQL','Redis','K8s','Rust','分布式系统','微服务','高并发','系统设计'];
  const matHead=`<tr><th>技能 \\ 岗位</th>${matCompanies.map(j=>`<th>${j.co.slice(0,2)}</th>`).join('')}</tr>`;
  const matBody=matSkills.map(sk=>{
    const s=skillByName(sk); const isGap=!s||s.lvl<2;
    const cells=matCompanies.map(j=>{
      const required=j.need.includes(sk)||j.plus.includes(sk);
      if(!required) return `<td></td>`;
      const have=s&&s.lvl>=2;
      return have?`<td class="cell-has">●</td>`:`<td class="cell-gap">○</td>`;
    }).join('');
    return `<tr style="cursor:default;"><td>${sk}${isGap?'<span class="skill-gaplabel">★ 缺口</span>':''}</td>${cells}</tr>`;
  }).join('');
  const matrix=`<div class="sec"><p class="seclabel">— GAP MATRIX</p><h2 class="sectitle">${tt('缺口矩阵','Gap matrix')}<span class="dot">.</span></h2>
    <p style="font-size:12px;color:var(--ink-3);margin:6px 0 16px;">● 已具备　○ 可补充　· 横向看岗位覆盖,纵向看技能需求</p>
    <div class="matrix-wrap"><table class="matrix"><thead>${matHead}</thead><tbody>${matBody}</tbody></table></div></div>`;

  const maxC=Math.max(...CITY_DIST.map(c=>c[1])), maxK=Math.max(...KIND_DIST.map(c=>c[1]));
  const dist=`<div class="sec"><p class="seclabel">— DISTRIBUTION</p><h2 class="sectitle">${tt('分布','Distribution')}<span class="dot">.</span></h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:18px;max-width:760px;">
    <div><p style="font-size:12px;color:var(--ink-3);margin:0 0 12px;font-family:var(--font-mono);letter-spacing:0.12em;">按城市</p>
      ${CITY_DIST.map(c=>`<div class="barrow" style="grid-template-columns:48px 1fr 30px;"><span class="blab">${c[0]}</span><div class="btrack"><i style="width:${c[1]/maxC*100}%;background:var(--status-info);"></i></div><span class="bval">${c[1]}</span></div>`).join('')}</div>
    <div><p style="font-size:12px;color:var(--ink-3);margin:0 0 12px;font-family:var(--font-mono);letter-spacing:0.12em;">按公司类型</p>
      ${KIND_DIST.map(c=>`<div class="barrow" style="grid-template-columns:96px 1fr 30px;"><span class="blab" style="font-size:12.5px;">${c[0]}</span><div class="btrack"><i style="width:${maxK?c[1]/maxK*100:0}%;background:var(--ink-mute);"></i></div><span class="bval">${c[1]}</span></div>`).join('')}</div>
    </div></div>`;

  const maxKw=Math.max(...KEYWORDS.map(k=>k[1]));
  const cloud=`<div class="sec" style="border-bottom:none;"><p class="seclabel">— KEYWORDS</p><h2 class="sectitle">${tt('JD 高频关键词','JD top keywords')}<span class="dot">.</span></h2>
    <p style="font-size:12px;color:var(--ink-3);margin:6px 0 18px;">除硬技能外,JD 中反复出现的"软词"</p>
    <div class="cloud">${KEYWORDS.map(k=>{const sz=12+(k[1]/maxKw)*12;return `<span class="kw" style="font-size:${sz}px;"><b>${k[0]}</b> <span class="c">${k[1]}次</span></span>`;}).join('')}</div></div>`;

  const maxTrend=Math.max(...TREND.map(t=>t.pct));
  const trendRows=TREND.map(t=>{
    const w=Math.min(48,(t.pct/maxTrend)*48);
    const bar=t.dir==='flat'?`<i class="up" style="width:3px;background:var(--ink-mute);"></i>`:`<i class="${t.dir}" style="width:${w}%;"></i>`;
    const sign=t.dir==='up'?'+':(t.dir==='down'?'−':'±');
    return `<div class="trend-row"><span class="tn">${t.skill}</span><div class="trend-track"><span class="mid"></span>${bar}</div><span class="trend-val ${t.dir}">${sign}${t.pct}%${t.note?'':''}</span></div>${t.note?`<div style="font-size:11.5px;color:var(--ink-mute);margin:-4px 0 4px 110px;">${t.note}</div>`:''}`;
  }).join('');
  const maxSal=100;
  const salRows=SALARY.map(s=>`<div class="sal-row"><span class="sn">${s.role}</span><div class="sal-bar"><i style="left:${s.lo}%;width:${s.hi-s.lo}%;"></i><span class="you" style="left:${YOU_VALUE}%;"></span></div><span class="sal-val">${s.lo}-${s.hi}万</span></div>`).join('');
  const market=`<div class="sec"><p class="seclabel">— MARKET INTEL</p><h2 class="sectitle">${tt('市场情报','Market intel')}<span class="dot">.</span></h2>
    <p style="font-size:12px;color:var(--ink-3);margin:6px 0 18px;max-width:680px;line-height:1.7;">聚合你的 12 份目标 JD 与市场样本得出 —— 这是只有"持续收集 JD"才攒得出的独家数据,也是产品真正的护城河。趋势仅作机会参考,不必焦虑。</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;">
    <div><p style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;color:var(--ink-3);margin:0 0 12px;">技能需求趋势 · 近 6 个月</p>${trendRows}
      <p style="font-size:11px;color:var(--ink-mute);margin:12px 0 0;">绿 = 需求上行 · 灰 = 平稳/回落</p></div>
    <div><p style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;color:var(--ink-3);margin:0 0 12px;">薪资 benchmark · <span style="color:var(--accent);">│</span> 为你的估算位</p>${salRows}
      <p style="font-size:12px;color:var(--ink-3);margin:14px 0 0;line-height:1.7;">你的估算位约 <b style="color:var(--accent);">${YOU_VALUE} 万</b>,处「高级」带中上沿。<button class="btn-text" onclick="openMarketValue()">看完整市场价值报告 →</button></p></div>
    </div></div>`;
  $('#page-analysis').innerHTML=frontis('ANALYSIS',tt('岗位分析','Analysis'))+skillTable+matrix+dist+market+cloud+signFoot();
}

/* ---------- SKILLS ---------- */
let skillFilter={cat:'全部', accrual:'全部'};
function capCard(s){
  const star=(s.pri==='high'&&s.lvl<2)?'<span class="star">★</span>':'';
  const ac=ACCRUAL[s.accrual];
  const eviList=s.evidence.length?`<ul>${s.evidence.slice(0,3).map(e=>`<li>${e}</li>`).join('')}</ul>`:`<button class="btn-text" style="margin-top:6px;">+ 添加证据</button>`;
  const priLabel=PRI[s.pri];
  const demandLabel=s.cat==='tech'?`在 ${s.demand} / 12 岗位需求`:`在 ${s.demand} / 12 份 JD 提及`;
  const tn=trainingFor(s.name);
  const train=(setState.trainCounts&&tn>0)?`<div style="margin-top:11px;padding-top:11px;border-top:0.5px solid var(--border);"><div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--ink-3);margin-bottom:5px;"><span>训练投入 <b style="color:var(--accent);font-family:var(--font-mono);">${tn}</b> 次</span><span class="mono" style="font-size:10px;letter-spacing:0.08em;">迈向 Lv ${Math.min(5,s.lvl+1)}</span></div><div class="bar" style="height:3px;"><i style="width:${Math.min(100,tn/3*100)}%"></i></div></div>`:'';
  return `<div class="skill-card" data-skill="${s.name}">
    <div class="stop"><div class="sname">${s.name} ${star}</div><span class="acbadge ${ac.cls}">${ac.label}</span></div>
    <div class="slvl">${dotsHTML(s.lvl,'lvl')}<span class="mono">${s.lvl} / 5</span></div>
    <div class="sstate">${s.state}${s.years?' · '+s.years+' 年':''}</div>
    <div class="smeta"><span>半衰期 <b>${s.halflife}</b></span><span>迁移性 <b>${s.transfer}</b></span></div>
    <div class="sevi"><span class="ec">项目证据 (${s.evidence.length})</span>${eviList}</div>
    <div class="sdemand"><span>${demandLabel}</span><span class="pl ${priLabel.cls}">优先级 ${priLabel.label}</span></div>
    ${train}
  </div>`;
}
function trainingFor(name){
  let n=0;
  ACTIONS.forEach(a=>{ if(a.cap===name) n+=(a.sessions||[]).length; });
  (typeof IV_RECORDS!=='undefined'?IV_RECORDS:[]).forEach(r=>{ if((r.tags||[]).includes(name)) n+=1; });
  return n;
}
function renderSkills(){
  const buckets={compound:[],accumulate:[],depreciate:[]};
  SKILLS.forEach(s=>buckets[s.accrual].push(s));
  const invest={compound:'优先投入',accumulate:'稳定维护',depreciate:'够用即可'};
  const lensCol=(key)=>{
    const ac=ACCRUAL[key]; const arr=buckets[key];
    const chips=arr.slice(0,9).map(s=>`<span class="chip" data-skill="${s.name}" style="cursor:pointer;">${s.name}</span>`).join('')+(arr.length>9?`<span class="chip" style="border:none;color:var(--ink-mute);">+${arr.length-9}</span>`:'');
    return `<div class="lens-col"><div class="lh"><span class="acbadge ${ac.cls}">${ac.label}</span><span class="mono" style="font-size:11px;color:var(--ink-3);">${arr.length} 项</span></div><p class="ld">${ac.desc}</p><div class="ll">${chips}</div><p class="invest">投资策略 · ${invest[key]}</p></div>`;
  };
  const lens=`<div class="sec"><p class="seclabel">— ACCRUAL VALUE</p><h2 class="sectitle">${tt('积累价值视角','Accrual-value lens')}<span class="dot">.</span></h2>
    <p style="font-size:12.5px;color:var(--ink-3);margin:6px 0 16px;max-width:680px;line-height:1.7;">${tt('不是所有能力都值得平均用力。复利型能力随经验跨场景叠加增值、几乎不折旧;易折旧能力与工具版本强绑定。把有限的刻意练习,优先投到复利与积累上。','Not every skill deserves equal effort. Compounding skills stack across contexts and barely depreciate; depreciating ones are tied to tool versions. Invest your limited deliberate practice in compounding & accumulating ones first.')}</p>
    <div class="lens">${lensCol('compound')}${lensCol('accumulate')}${lensCol('depreciate')}</div></div>`;
  const cats=['全部','元能力','通用能力','专业技能'];
  const catLab={'全部':tt('全部','All'),'元能力':tt('元能力','Meta'),'通用能力':tt('通用能力','General'),'专业技能':tt('专业技能','Technical')};
  const accs=[['全部',tt('全部','All')],['compound',tt('复利型','Compounding')],['accumulate',tt('积累型','Accumulating')],['depreciate',tt('易折旧','Depreciating')]];
  const bar=`<div class="filterbar">
    <div class="filtergroup"><span class="fl">${tt('类别','Category')}</span>${cats.map(c=>`<button class="fopt ${skillFilter.cat===c?'on':''}" data-sc="${c}">${catLab[c]}</button>`).join('')}</div>
    <div class="filtergroup"><span class="fl">${tt('积累','Accrual')}</span>${accs.map(a=>`<button class="fopt ${skillFilter.accrual===a[0]?'on':''}" data-sa="${a[0]}">${a[1]}</button>`).join('')}</div>
  </div>`;
  const order=['meta','general','tech'];
  const eyebrowMap={meta:'META ABILITIES',general:'GENERAL',tech:'TECHNICAL'};
  const noteMap={meta:'元能力是「学习能力的能力」— 复利最强、最该养护,却最少被显式训练。',general:'通用能力跨岗位迁移,JD 里常以「Owner / 推动 / 落地」等软词出现。',tech:'专业技能里,架构思维复利、语言与中间件积累、特定工具易折旧 — 区别对待。'};
  let sections='';
  order.forEach(cat=>{
    if(skillFilter.cat!=='全部' && CAT_LABEL[cat]!==skillFilter.cat) return;
    const arr=SKILLS.filter(s=>s.cat===cat && (skillFilter.accrual==='全部'||s.accrual===skillFilter.accrual));
    if(!arr.length) return;
    sections+=`<div class="sec"><p class="seclabel">— ${eyebrowMap[cat]}</p><h2 class="sectitle">${CAT_LABEL[cat]} <span style="font-family:var(--font-mono);font-style:normal;font-size:12px;color:var(--ink-3);">${arr.length}</span><span class="dot">.</span></h2>
      <p style="font-size:12px;color:var(--ink-3);margin:6px 0 0;">${noteMap[cat]}</p>
      <div class="skill-grid" style="margin-top:16px;">${arr.map(capCard).join('')}</div></div>`;
  });
  if(!sections) sections=`<div class="sec"><p style="color:var(--ink-3);padding:20px 0;text-align:center;">${tt('没有符合筛选的能力','No abilities match the filter')}</p></div>`;
  const assetIntro=`<div class="sec" style="border-bottom:none;padding-bottom:0;"><div class="ai-bar" style="border:0.5px solid var(--border);">
    <span class="dot"></span><span class="lbl">${tt('由简历 <b>'+RESUME.filename+'</b> 自动建档 · 这是你贯穿职业生涯的长期资产,在职时也值得每季度盘点','Auto-built from <b>'+RESUME.filename+'</b> · a long-term career asset worth reviewing quarterly, even while employed')}</span>
    <button class="btn-text" style="margin-left:auto;" onclick="openMarketValue()">${tt('市场价值报告','Market value report')} →</button></div></div>`;
  $('#page-skills').innerHTML=frontis('CAREER ASSETS',tt('职业资产','Career assets'))+assetIntro+lens+bar+sections+signFoot();
  $$('#page-skills [data-sc]').forEach(b=>b.onclick=()=>{skillFilter.cat=b.dataset.sc;renderSkills();});
  $$('#page-skills [data-sa]').forEach(b=>b.onclick=()=>{skillFilter.accrual=b.dataset.sa;renderSkills();});
  $$('#page-skills [data-skill]').forEach(c=>c.onclick=(e)=>{e.stopPropagation();openSkillDetail(c.dataset.skill);});
}

function openSkillDetail(name){
  const s=skillByName(name); const ac=ACCRUAL[s.accrual];
  const evi=s.evidence.length?s.evidence.map((e,i)=>`<div style="padding:11px 0;border-bottom:0.5px solid var(--border);"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:14px;"><span style="font-size:14px;color:var(--ink);"><span class="idx" style="margin-right:8px;">${String(i+1).padStart(2,'0')}</span>${e}</span><span style="display:flex;gap:10px;white-space:nowrap;"><button class="btn-text">${tt('编辑','Edit')}</button><button class="btn-text" style="color:var(--ink-mute);">${tt('删除','Delete')}</button></span></div></div>`).join(''):`<p style="color:var(--ink-3);font-size:13px;padding:8px 0;">${tt('暂无证据 — 这正是可以补充的方向。','No evidence yet — a good place to add some.')}</p>`;
  let demandBlock;
  if(s.cat==='tech'){
    const demandJobs=JOBS.filter(j=>j.need.includes(name)||j.plus.includes(name)).map(j=>`<span class="chip">${j.co}</span>`).join(' ');
    demandBlock=`<h3 class="sectitle" style="font-size:16px;margin-bottom:10px;">${tt('在 '+s.demand+' / 12 岗位中被明确要求','Explicitly required in '+s.demand+' / 12 jobs')}<span class="dot">.</span></h3><div style="display:flex;gap:6px;flex-wrap:wrap;">${demandJobs||`<span style="color:var(--ink-3);font-size:13px;">${tt('暂无','None')}</span>`}</div>`;
  }else{
    const soft=['Owner','推动','落地','稳定性','复盘','0-1','协同'];
    demandBlock=`<h3 class="sectitle" style="font-size:16px;margin-bottom:8px;">${tt('在 '+s.demand+' / 12 份 JD 中作为软性要求出现','Appears as a soft requirement in '+s.demand+' / 12 JDs')}<span class="dot">.</span></h3><p style="font-size:13px;color:var(--ink-3);margin:0 0 11px;line-height:1.7;">${tt('通用能力与元能力很少被写成硬性技能,却藏在 JD 反复出现的这些词里:','General & meta abilities are rarely listed as hard skills — they hide in the words JDs keep repeating:')}</p><div style="display:flex;gap:6px;flex-wrap:wrap;">${soft.map(k=>`<span class="chip">${k}</span>`).join('')}</div>`;
  }
  const accrualNote={
    compound:tt('复利型能力 — 每次刻意练习的收益会叠加,并迁移到新场景,折旧极慢。值得在训练排期里优先占位。','Compounding — each practice session\'s payoff stacks and transfers to new contexts, with very slow decay. Give it priority in your training schedule.'),
    accumulate:tt('积累型能力 — 稳定、抗折旧,但收益接近线性。保持手感、按需深化即可,不必过度投入。','Accumulating — stable and decay-resistant, but returns are near-linear. Keep it sharp and deepen as needed; no need to overinvest.'),
    depreciate:tt('易折旧能力 — 与具体工具/版本强绑定,更新很快。抓住背后可迁移的概念,具体字段够用即查,别陷进去。','Depreciating — tied to specific tools/versions that change fast. Grasp the transferable concepts behind it; look up the specifics as needed, don\'t over-sink.')
  }[s.accrual];
  const tn=trainingFor(name);
  const trainItems=[];
  ACTIONS.forEach(a=>{ if(a.cap===name)(a.sessions||[]).forEach(se=>trainItems.push([tt('训练','Train'),a.title,se.date,tt(se.mins+' 分钟',se.mins+' min')])); });
  IV_RECORDS.forEach(r=>{ if((r.tags||[]).includes(name)) trainItems.push([tt('面试','Interview'),r.qText,r.date,tt(r.scores.overall.toFixed(1)+' 分',r.scores.overall.toFixed(1)+' pts')]); });
  const trainBlock=(setState.trainCounts&&tn>0)?`<div class="msec"><p class="seclabel">— TRAINING</p><h3 class="sectitle" style="font-size:16px;margin-bottom:6px;">${tt('训练投入 · '+tn+' 次','Training invested · '+tn)}<span class="dot">.</span></h3>
    <p style="font-size:12.5px;color:var(--ink-3);margin:0 0 10px;line-height:1.7;">${tt('来自刻意练习与面试陪练的投入,作为这项能力成长的参考(可在设置中关闭)。每 3 次投入约推进一格。','Drawn from deliberate practice & interview prep as a growth signal (toggle off in settings). ~3 sessions advances one level.')}</p>
    <div class="bar" style="height:4px;margin-bottom:12px;"><i style="width:${Math.min(100,tn/3*100)}%"></i></div>
    ${trainItems.slice(0,6).map(t=>`<div style="display:flex;gap:12px;align-items:baseline;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;"><span class="q-cat" style="border:none;padding:0;color:var(--accent);">${t[0]}</span><span style="flex:1;color:var(--ink-2);line-height:1.5;">${t[1]}</span><span class="mono" style="font-size:11px;color:var(--ink-3);white-space:nowrap;">${t[2]} · ${t[3]}</span></div>`).join('')}</div>`:'';
  const levels=[['1',tt('听说过','Heard of it')],['2',tt('用过教程','Did a tutorial')],['3',tt('业务里用过','Used at work')],['4',tt('主导过项目','Led a project')],['5',tt('能教别人','Can teach it')]];
  const lvlList=levels.map(l=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13.5px;color:${+l[0]===s.lvl?'var(--ink)':'var(--ink-3)'};"><span style="width:10px;height:10px;border-radius:50%;border:1px solid var(--border-strong);${+l[0]<=s.lvl?'background:var(--accent);border-color:var(--accent);':''}"></span><span class="mono" style="font-size:11px;">${l[0]}</span><span>${l[1]}</span></div>`).join('');
  const html=`
    <div class="modal-head"><div><h2>${name}</h2><div class="sub"><span class="chip">${CAT_LABEL[s.cat]}</span><span class="acbadge ${ac.cls}">${ac.label}</span><span>${dotsHTML(s.lvl,'lvl')}</span><span>${s.lvl} / 5</span><span>·</span><span>${s.state}</span></div></div><button class="x">${IC.x}</button></div>
    <div class="modal-body">
      <div class="msec"><p class="seclabel">— ACCRUAL VALUE</p><h3 class="sectitle" style="font-size:16px;margin-bottom:8px;">${tt('积累价值','Accrual value')}<span class="dot">.</span></h3>
        <div style="display:flex;gap:36px;margin:6px 0 13px;">${[[tt('类型','Type'),ac.label],[tt('半衰期','Half-life'),s.halflife],[tt('迁移性','Transfer'),s.transfer]].map(x=>`<div><p style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-3);margin:0;">${x[0]}</p><p style="font-size:16px;color:var(--ink);margin:5px 0 0;font-weight:500;">${x[1]}</p></div>`).join('')}</div>
        <p style="font-size:13px;color:var(--ink-2);line-height:1.75;margin:0;">${accrualNote}</p></div>
      <div class="msec"><p class="seclabel">— EVIDENCE</p><h3 class="sectitle" style="font-size:16px;margin-bottom:8px;">${tt('项目证据','Evidence')} (${s.evidence.length})<span class="dot">.</span></h3>${evi}<button class="btn-text" style="margin-top:14px;">${tt('+ 添加新证据','+ Add evidence')}</button></div>
      <div class="msec"><p class="seclabel">— DEMAND</p>${demandBlock}</div>
      ${trainBlock}
      <div class="msec" style="border-bottom:none;"><p class="seclabel">— LEVEL</p><h3 class="sectitle" style="font-size:16px;margin-bottom:10px;">${tt('掌握程度','Proficiency')}<span class="dot">.</span></h3>${lvlList}</div>
    </div>`;
  openModal(html);
}
</script>
<script>
/* ---------- ACTIONS ---------- */
let actTab='全部';
function sessMins(a){return (a.sessions||[]).reduce((x,s)=>x+s.mins,0);}
function renderActions(){
  const counts={全部:ACTIONS.length, 进行中:ACTIONS.filter(a=>a.state==='doing').length, 待开始:ACTIONS.filter(a=>a.state==='todo').length, 已完成:ACTIONS.filter(a=>a.state==='done').length};
  const tabs=[['全部',tt('全部','All')],['进行中',tt('进行中','In progress')],['待开始',tt('待开始','Not started')],['已完成',tt('已完成','Done')]];
  const tabbar=`<div class="tabs">${tabs.map(t=>`<button class="tab ${actTab===t[0]?'on':''}" data-at="${t[0]}">${t[1]} (${counts[t[0]]||0})</button>`).join('')}</div>`;
  const allMins=ACTIONS.reduce((x,a)=>x+sessMins(a),0);
  const allSess=ACTIONS.reduce((x,a)=>x+(a.sessions||[]).length,0);
  const summary=`<div style="display:flex;gap:34px;padding:18px 0 2px;flex-wrap:wrap;">
    ${[[ (allMins/60).toFixed(1),tt('小时已投入','hours invested')],[allSess,tt('次训练记录','training logs')],[counts.进行中,tt('项进行中','in progress')]].map(x=>`<div><span style="font-family:var(--font-serif);font-size:26px;color:var(--ink);font-weight:500;">${x[0]}</span><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:var(--ink-3);margin-left:8px;">${x[1]}</span></div>`).join('')}
  </div><p style="font-size:12px;color:var(--ink-3);margin:2px 0 0;">${tt('刻意练习 = 明确目标 + 拆解里程碑 + 记录每次训练 + 复盘。点开任意行动查看训练详情。','Deliberate practice = clear goal + milestones + logging each session + reflection. Open any action for training detail.')}</p>`;
  const stMap={doing:'进行中',todo:'待开始',done:'已完成'};
  let list=ACTIONS.filter(a=>actTab==='全部'||stMap[a.state]===actTab);
  const stOrder={doing:0,todo:1,done:2}; const prOrder={high:0,mid:1,low:2};
  list=[...list].sort((a,b)=>stOrder[a.state]-stOrder[b.state]||prOrder[a.pri]-prOrder[b.pri]);
  const cards=list.map(a=>{
    const cbox=a.state==='done'?'done':(a.state==='doing'?'half':'');
    const pri=PRI[a.pri];
    const meta=[];
    meta.push(a.state==='done'?tt('已完成','Done'):(a.state==='doing'?tt('进行中','In progress'):tt('待开始','Not started')));
    if(a.cap) meta.push(`${tt('练','Train')} <b style="color:var(--ink-2);font-weight:500;">${a.cap}</b>`);
    if(a.fromJobs) meta.push(tt('来自 '+a.fromJobs+' 个岗位','from '+a.fromJobs+' jobs'));
    if(a.due) meta.push(tt('截止 '+a.due,'due '+a.due));
    if(a.est&&a.state!=='done') meta.push(tt('预估 '+a.est,'est. '+a.est));
    const next=(a.milestones||[]).find(m=>!m.done);
    const doneMs=(a.milestones||[]).filter(m=>m.done).length, totMs=(a.milestones||[]).length;
    const mins=sessMins(a), sessN=(a.sessions||[]).length;
    return `<div class="act-card ${a.state==='done'?'is-done':''}" data-act="${a.id}">
      <span class="cbox lg ${cbox}" data-toggle="${a.id}">${IC.check}</span>
      <div class="act-body">
        <div class="act-top">
          <div><div class="act-title">${a.title}</div>${a.note?`<div style="font-size:12.5px;color:var(--ink-3);margin-top:4px;">${a.note}</div>`:''}</div>
          <span class="pl ${pri.cls}" style="font-family:var(--font-mono);font-size:11px;white-space:nowrap;">${tt('优先级 '+pri.label,'Priority '+pri.label)}</span>
        </div>
        <div class="act-meta">${meta.join('<span style="color:var(--ink-mute);">·</span>')}</div>
        <div class="act-prog"><div class="bar"><i style="width:${a.progress||0}%"></i></div><span class="pv">${a.progress||0}%</span></div>
        <div class="act-stats">
          <span class="act-stat"><b>${(mins/60).toFixed(1)}</b>${tt('小时训练','h trained')}</span>
          <span class="act-stat"><b>${sessN}</b>${tt('次记录','logs')}</span>
          <span class="act-stat"><b>${doneMs}/${totMs}</b>${tt('里程碑','milestones')}</span>
        </div>
        ${next?`<div class="act-next">${tt('下一步','Next')} · <b>${next.t}</b></div>`:(a.state==='done'?`<div class="act-next" style="color:var(--status-done);">${tt('全部里程碑已完成','All milestones done')}</div>`:'')}
        <button class="btn act-open" data-detail="${a.id}">${tt('打开训练详情','Open training detail')}</button>
      </div>
    </div>`;
  }).join('');
  const body=`<div class="sec" style="border-bottom:none;padding-top:18px;">${cards||`<p style="color:var(--ink-3);padding:30px 0;text-align:center;">${tt('这个分类暂无行动','No actions in this category')}</p>`}</div>`;
  $('#page-actions').innerHTML=frontis('ACTIONS',tt('行动清单','Action list'))+summary+tabbar+body+signFoot();
  $$('#page-actions [data-at]').forEach(b=>b.onclick=()=>{actTab=b.dataset.at;renderActions();});
  $$('#page-actions [data-toggle]').forEach(cb=>cb.onclick=(e)=>{e.stopPropagation();toggleAction(+cb.dataset.toggle);});
  $$('#page-actions [data-detail]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();openActionDetail(+b.dataset.detail);});
}
function recalcProgress(a){
  if(a.milestones&&a.milestones.length){
    a.progress=Math.round(a.milestones.filter(m=>m.done).length/a.milestones.length*100);
  }
}
function toggleAction(id){
  const a=ACTIONS.find(x=>x.id===id);
  a.state = a.state==='todo'?'doing':(a.state==='doing'?'done':'todo');
  recalcProgress(a);
  if(a.state==='done'){a.progress=100; a.due=a.due||'2026.06.02';}
  renderActions();
  const card=$(`#page-actions [data-act="${id}"]`);
  if(card){card.classList.add('flash'); setTimeout(()=>card.classList.remove('flash'),650);}
  toast('行动状态已更新');
  renderOverview();
  persistColl('actions', ACTIONS);
}
function openActionDetail(id){
  const a=ACTIONS.find(x=>x.id===id);
  const stLabel=a.state==='done'?'已完成':(a.state==='doing'?'进行中':'待开始');
  const totalMins=sessMins(a);
  const ms=(a.milestones||[]).map((m,i)=>`<div class="ms-row ${m.done?'done':''}" data-ms="${i}"><span class="cbox ${m.done?'done':''}">${IC.check}</span><span class="t">${m.t}</span></div>`).join('');
  const sessions=(a.sessions&&a.sessions.length)?`<div class="slog">${a.sessions.slice().reverse().map(s=>`<div class="sitem"><div class="sh"><span class="sd">${s.date}</span><span class="sm">${s.mins} 分钟</span></div><div class="sn">${s.note}</div></div>`).join('')}</div>`:`<p style="color:var(--ink-3);font-size:13px;padding:8px 0;">还没有训练记录 — 完成第一次练习后点「记录一次训练」。</p>`;
  const html=`
    <div class="modal-head"><div><p class="eyebrow">— ACTION</p><h2 style="margin-top:5px;">${a.title}</h2>
      <div class="sub"><span>${stLabel}</span><span>·</span><span class="pl ${PRI[a.pri].cls}">优先级 ${PRI[a.pri].label}</span>${a.cap?`<span>·</span><span>练 ${a.cap}</span>`:''}${a.due?`<span>·</span><span>截止 ${a.due}</span>`:''}</div></div>
      <button class="x">${IC.x}</button></div>
    <div class="modal-body">
      <div class="msec"><p class="seclabel">— GOAL</p><h3 class="sectitle" style="font-size:16px;margin-bottom:8px;">训练目标<span class="dot">.</span></h3><p style="font-size:14px;color:var(--ink-2);line-height:1.75;margin:0;">${a.goal||'—'}</p></div>
      <div class="msec"><p class="seclabel">— PROGRESS</p><h3 class="sectitle" style="font-size:16px;margin-bottom:12px;">进度与里程碑<span class="dot">.</span></h3>
        <div class="act-prog" style="margin:0 0 14px;"><div class="bar" style="max-width:none;"><i style="width:${a.progress||0}%"></i></div><span class="pv">${a.progress||0}%</span></div>
        ${ms||'<p style="color:var(--ink-3);font-size:13px;">暂无里程碑</p>'}<p style="font-size:11.5px;color:var(--ink-mute);margin:10px 0 0;">勾选里程碑会自动更新进度</p></div>
      <div class="msec"><p class="seclabel">— PRACTICE LOG</p><h3 class="sectitle" style="font-size:16px;margin-bottom:6px;">训练记录 · 累计 ${(totalMins/60).toFixed(1)} 小时 / ${(a.sessions||[]).length} 次<span class="dot">.</span></h3>
        ${sessions}
        <button class="btn btn-accent" id="addSess" style="margin-top:14px;">+ 记录一次训练</button><div id="sessFormHost"></div></div>
      <div class="msec" style="border-bottom:none;"><p class="seclabel">— REFLECTION</p><h3 class="sectitle" style="font-size:16px;margin-bottom:10px;">复盘<span class="dot">.</span></h3>
        <textarea class="textarea" style="min-height:88px;font-family:var(--font-sans);font-size:13.5px;line-height:1.7;" placeholder="这次练习最大的收获是什么?下一步聚焦哪里?">${a.reflection||''}</textarea></div>
    </div>`;
  const m=openModal(html, true);
  $$('[data-ms]',m).forEach(r=>r.onclick=()=>{
    const i=+r.dataset.ms; a.milestones[i].done=!a.milestones[i].done;
    recalcProgress(a);
    a.state = a.progress===100?'done':(a.progress>0?'doing':a.state);
    openActionDetail(id); renderActions(); renderOverview(); persistColl('actions', ACTIONS);
  });
  $('#addSess',m).onclick=()=>{
    const host=$('#sessFormHost',m);
    host.innerHTML=`<div class="sess-form">
      <div class="field-row"><div class="field"><label>日期</label><input class="input" id="sfDate" value="2026.06.02"></div><div class="field"><label>时长 (分钟)</label><input class="input" id="sfMin" type="number" value="60"></div></div>
      <div class="field"><label>这次练了什么 · 收获</label><textarea class="textarea" id="sfNote" style="min-height:66px;font-family:var(--font-sans);" placeholder="如 · 跑通 KV 存储 benchmark,理解了写放大"></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;"><button class="btn" id="sfCancel">取消</button><button class="btn btn-accent" id="sfSave">保存记录</button></div></div>`;
    $('#addSess',m).style.display='none';
    $('#sfCancel',host).onclick=()=>{host.innerHTML='';$('#addSess',m).style.display='';};
    $('#sfSave',host).onclick=()=>{
      const date=$('#sfDate',host).value||'2026.06.02';
      const mins=Math.max(1,+($('#sfMin',host).value)||30);
      const note=$('#sfNote',host).value.trim()||'(未填写收获)';
      a.sessions=a.sessions||[]; a.sessions.push({date,mins,note});
      if(a.state==='todo') a.state='doing';
      toast('已记录 '+mins+' 分钟训练 · 继续保持');
      openActionDetail(id); renderActions(); renderOverview(); persistColl('actions', ACTIONS);
    };
  };
}

/* ---------- SETTINGS ---------- */
let setState={theme:'light', fontsize:'14', goal:20, trainCounts:true, lang:'zh', density:'standard', motion:'on', autobackup:'on', period:'2026 年 6 月', salary:'30 — 60 万'};
let settingsState={tab:'basic'};
const MODEL={mode:'byo', protocol:'anthropic', baseUrl:'https://api.anthropic.com', apiKey:'', model:'claude-3-5-haiku', models:[], temp:0.5,
  stt:'browser', sttUrl:'', sttKey:'', sttModel:'', tts:'browser', ttsUrl:'', ttsKey:'', ttsVoice:''};
const WEIGHTS=[['兴趣分',40],['成长分',30],['匹配分',20],['机会分',10]];
const SET_TABS=[['basic',['基本设置','Basics']],['profile',['个人信息','Profile']],['model',['模型配置','Model']],['goals',['目标设置','Goals']],['weights',['评分权重','Weights']],['data',['数据管理','Data']],['about',['关于','About']]];

/* ===== 数据设置持久化(除非用户清除,持续保留)。profile 落盘(rt.profile · 隔离);
   目标/权重/外观偏好走 localStorage(jh-settings);theme/lang 沿用各自既有键。 ===== */
function settingsPersistOn(){ return typeof isDesktop==='function' && isDesktop() && !!window.SeekerRT; }
function saveSettings(){
  try{ localStorage.setItem('jh-settings', JSON.stringify({
    fontsize:setState.fontsize, goal:setState.goal, trainCounts:setState.trainCounts, density:setState.density,
    motion:setState.motion, autobackup:setState.autobackup, period:setState.period, salary:setState.salary,
    weights:WEIGHTS.map(w=>w[1])
  })); }catch(_e){}
}
function hydrateSettings(){
  try{ const s=JSON.parse(localStorage.getItem('jh-settings')||'null'); if(!s) return;
    ['fontsize','goal','trainCounts','density','motion','autobackup','period','salary'].forEach(k=>{ if(s[k]!=null) setState[k]=s[k]; });
    if(Array.isArray(s.weights)) s.weights.forEach((v,i)=>{ if(WEIGHTS[i]!=null && typeof v==='number') WEIGHTS[i][1]=v; });
  }catch(_e){}
}
function persistProfileField(k, v){ if(settingsPersistOn()) window.SeekerRT.profile.set(k, String(v==null?'':v)).catch(e=>console.error('[data] profile set', e)); }
async function hydrateProfile(){
  if(!settingsPersistOn()) return;
  try{ const p=await window.SeekerRT.profile.getAll();
    if(p && typeof p==='object'){ Object.keys(p).forEach(k=>{ PROFILE[k]=p[k]; }); try{ if(current==='settings') renderSettings(); }catch(_e){} }
  }catch(e){ console.error('[data] hydrate profile', e); }
}
window.addEventListener('seeker-rt-ready', hydrateProfile);
/* ===== 隐私 · 历史与记忆掌控(#4 用户掌控)—— 设置页入口,不经对话改;清除走 guardrail。 ===== */
function _mgrEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function _mgrTime(ts){ try{ return new Date(+ts||0).toLocaleString(); }catch(_e){ return ''; } }
async function openHistoryManager(){
  const rt=window.SeekerRT, G=window.SeekerGuardrail;
  const m=openModal(`<div class="modal-head"><div><p class="eyebrow">— PRIVACY</p><h2 style="margin-top:5px;">${tt('会话历史','Chat history')}</h2></div><button class="x">${IC.x}</button></div>
    <div class="modal-body" id="histBody" style="min-height:120px;">${tt('加载中…','Loading…')}</div>
    <div class="modal-foot"><button class="btn" id="histClear">${tt('清除全部会话历史','Clear all history')}</button><button class="btn btn-accent" onclick="closeModal()">${tt('完成','Done')}</button></div>`, true);
  const render=async()=>{
    let rows=[]; try{ rows=await rt.db.list('messages'); }catch(_e){}
    rows.sort((a,b)=>(a.ts||0)-(b.ts||0));
    const body=m.querySelector('#histBody'); if(!body) return;
    if(!rows.length) body.innerHTML=`<p style="color:var(--ink-3);padding:18px 0;text-align:center;">${tt('暂无会话历史。','No chat history yet.')}</p>`;
    else body.innerHTML=`<p style="font-size:12px;color:var(--ink-3);margin:0 0 12px;">${tt('共 ','Total ')}${rows.length}${tt(' 条 · 仅存本地',' · local only')}</p>`+rows.map(r=>{
      const who=r.role==='user'?tt('我','Me'):(r.surface==='agent'?'Agent':'Copilot');
      const cls=r.role==='user'?'var(--accent)':'var(--ink-3)';
      return `<div style="padding:8px 0;border-bottom:0.5px solid var(--border);"><div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:${cls};margin-bottom:3px;">${who} · ${_mgrTime(r.ts)}</div><div style="font-size:13px;color:var(--ink-2);line-height:1.55;white-space:pre-wrap;">${_mgrEsc(r.text)}</div></div>`;
    }).join('');
    const cb=m.querySelector('#histClear'); if(cb) cb.style.display=rows.length?'':'none';
  };
  await render();
  const cb=m.querySelector('#histClear');
  if(cb) cb.onclick=async()=>{
    if(!G||!G.confirmDestructive) return;
    let snaps=[];
    await G.confirmDestructive({
      title:tt('清除全部会话历史?','Clear all chat history?'),
      detail:tt('将删除本地所有会话消息(Copilot 与 Agent)。可在几秒内撤销。','Deletes all local chat messages (Copilot & Agent). Undoable for a few seconds.'),
      confirmLabel:tt('清除','Clear'), undoText:tt('已清除会话历史','Chat history cleared'),
      onConfirm:async()=>{ snaps=[]; let rows=[]; try{rows=await rt.db.list('messages');}catch(_e){} for(const r of rows){ try{ const s=await rt.db.remove('messages', r.id); if(s) snaps.push(s); }catch(_e){} } await render(); },
      onUndo:async()=>{ for(const s of snaps){ try{ await rt.db.upsert('messages', s); }catch(_e){} } await render(); },
    });
  };
}
async function openMemoryManager(){
  const rt=window.SeekerRT, G=window.SeekerGuardrail;
  const m=openModal(`<div class="modal-head"><div><p class="eyebrow">— PRIVACY</p><h2 style="margin-top:5px;">${tt('长期记忆','Long-term memory')}</h2></div><button class="x">${IC.x}</button></div>
    <div class="modal-body" id="memBody" style="min-height:120px;">${tt('加载中…','Loading…')}</div>
    <div class="modal-foot"><button class="btn" id="memClear">${tt('清除全部记忆','Clear all memory')}</button><button class="btn btn-accent" onclick="closeModal()">${tt('完成','Done')}</button></div>`, true);
  const render=async()=>{
    let rows=[]; try{ rows=await rt.memory.list(); }catch(_e){}

/* D3:导出 / 脱敏导出 / 导入(桌面真接平台核;web 沿用 mock)。导入用 <input type=file> 读文件,零新插件。 */
function wireDataIO(){
  const exp=$('#dataExport'), expR=$('#dataExportRedacted'), imp=$('#dataImport'), impFile=$('#dataImportFile');
  if(!exp) return;
  const mh=$('#mgrHistory'); if(mh) mh.onclick=openHistoryManager;   // 历史与记忆掌控(#4),web/桌面皆可
  const mm=$('#mgrMemory'); if(mm) mm.onclick=openMemoryManager;
  const md=$('#mgrDocs'); if(md) md.onclick=openDocsManager;          // RAG 知识库管理(#2)
  const mcpB=$('#mgrMcp'); if(mcpB) mcpB.onclick=openMcpManager;       // MCP server 管理(#2 C4)
  const on = (typeof isDesktop==='function' && isDesktop() && !!window.SeekerRT);
  if(!on){
    exp.onclick=()=>toast('已导出 jobhunt-data.json (mock)');
    if(expR) expR.onclick=()=>toast('脱敏导出 (mock)');
    if(imp) imp.onclick=()=>toast('请选择文件 (mock)');
    return;
  }
  const rt=window.SeekerRT;
  exp.onclick=()=>rt.db.export(false).then(p=>toast(tt('已导出到 ','Exported to ')+p)).catch(e=>toast(String((e&&e.message)||e)));
  if(expR) expR.onclick=()=>rt.db.export(true).then(p=>toast(tt('已脱敏导出(不含隐私)到 ','Redacted export to ')+p)).catch(e=>toast(String((e&&e.message)||e)));
  if(imp&&impFile){
    imp.onclick=()=>impFile.click();
    impFile.onchange=()=>{
      const f=impFile.files&&impFile.files[0]; if(!f){return;}
      const reader=new FileReader();
      reader.onload=()=>{
        rt.db.import(String(reader.result||'')).then(counts=>{
          const total=Object.values(counts||{}).reduce((a,b)=>a+(+b||0),0);
          toast(tt('已导入 ','Imported ')+total+tt(' 条(导入前已自动快照)',' records (snapshot taken first)'));
          if(typeof hydrateJobs==='function') hydrateJobs();
        }).catch(e=>toast(tt('导入失败:','Import failed: ')+String((e&&e.message)||e)));
        impFile.value='';
      };
      reader.readAsText(f);
    };
  }
}

/* 一协议多模型:渲染已存模型 chips(当前高亮 ✓、点选切换、× 删除)+ 添加。
   桌面经 rt.ai.{setConfig/selectModel/removeModel} 落 provider.json;web 改 MODEL 内存(mock)。 */
function renderModelList(){
  const wrap=$('#mdModelList'); if(!wrap) return;
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  const models=(MODEL.models&&MODEL.models.length)?MODEL.models:(MODEL.model?[MODEL.model]:[]);
  wrap.innerHTML = models.length
    ? models.map(m=>`<span class="md-model ${m===MODEL.model?'on':''}" data-mdl="${esc(m)}">${esc(m)}${m===MODEL.model?' ✓':''}<button class="md-x" data-mdlx="${esc(m)}" title="${tt('删除','Delete')}">×</button></span>`).join('')
    : `<span style="font-size:12px;color:var(--ink-mute);">${tt('还没有保存的模型 —— 在下方添加','No saved models — add one below')}</span>`;
  [...wrap.querySelectorAll('[data-mdl]')].forEach(ch=>ch.onclick=(e)=>{ if(e.target.closest('[data-mdlx]')) return; selectModelUI(ch.dataset.mdl); });
  [...wrap.querySelectorAll('[data-mdlx]')].forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); removeModelUI(b.dataset.mdlx); });
}
function selectModelUI(m){ if(!m) return; const was=MODEL.model; MODEL.model=m; if(settingsPersistOn()) window.SeekerRT.ai.selectModel(m).catch(e=>toast(String((e&&e.message)||e))); renderModelList(); if(m!==was) toast(tt('已切换到 ','Now using ')+m); }
function removeModelUI(m){ MODEL.models=(MODEL.models||[]).filter(x=>x!==m); if(MODEL.model===m) MODEL.model=MODEL.models[0]||''; if(settingsPersistOn()) window.SeekerRT.ai.removeModel(m).catch(()=>{}); renderModelList(); toast(tt('已删除模型 ','Removed ')+m); }
function addModelUI(m){ m=(m||'').trim(); if(!m) return; if(!(MODEL.models||[]).includes(m)) MODEL.models=(MODEL.models||[]).concat(m); MODEL.model=m;
  if(settingsPersistOn()) window.SeekerRT.ai.setConfig({model:m}).then(()=>toast(tt('已添加并启用 ','Added & using ')+m)).catch(e=>toast(String((e&&e.message)||e)));
  else toast(tt('已添加并启用 ','Added & using ')+m);
  renderModelList(); }

function ivScore(answer){
  const len=(answer||'').length;
  const base=len>120?7.5:(len>40?6.5:5.5);
  const r=()=>Math.min(9.5, Math.max(5, base+(Math.random()*2-0.8)));
  const structure=Math.round(r()*10)/10, depth=Math.round(r()*10)/10, quant=Math.round((len>80?r():r()-1)*10)/10;
  const overall=Math.round((structure+depth+quant)/3*10)/10;
  const goodPool=['结构清晰:先澄清/结论,再分层展开','抓住了核心瓶颈,优先级判断准确','主动给了容量估算,体现工程量感','用了真实数据支撑论点,可信度高'];
  const impPool=['权衡部分可更深:为什么选 A 不选 B,代价是什么','缺一个量化兜底:降级阈值 / 限流水位 / 恢复时长','可主动谈一句演进路线,展示长期视角','边界条件再补:极端流量 / 故障域 / 数据倾斜','表达可更精炼,先结论后展开'];
  const pick=(arr,n)=>arr.slice().sort(()=>Math.random()-0.5).slice(0,n);
  return {scores:{structure,depth,quant:Math.max(5,quant),overall}, good:pick(goodPool,2), improve:pick(impPool,3)};
}

/* AI mock engine: progressive steps → result */
function aiRun(host, steps, resultFn, opts){
  opts=opts||{};
  host.innerHTML=`<div class="ai-loading"><span class="ai-dots"><i></i><i></i><i></i></span><span>${opts.label||'AI 分析中…'}</span></div><div id="ai-steps" style="padding:0 16px 16px;"></div>`;
  const sh=host.querySelector('#ai-steps'); let i=0;
  const tick=()=>{
    if(i<steps.length){ sh.insertAdjacentHTML('beforeend',`<div class="ai-step"><span class="tick">✓</span>${steps[i]}</div>`); i++; setTimeout(tick, 360+Math.random()*220); }
    else { setTimeout(()=>{ host.innerHTML=(typeof resultFn==='function'?resultFn():resultFn); if(opts.after)opts.after(host); }, 320); }
  };
  setTimeout(tick, 420);
}

function resumeExport(id){
  const j=JOBS.find(x=>x.id===id); const r=RESUME_TAILORED[id];
  let md=`# ${PROFILE.name} · 针对 ${j.co} · ${j.role.split('·')[0].trim()}\n`;
  r.modules.filter(m=>m.on).forEach(m=>{
    if(m.type==='locked') md+=`\n## 基本信息\n求职意向:${PROFILE.intent} · 城市:${PROFILE.city} · 经验:${PROFILE.exp}\n电话:${PROFILE.phone} · 邮箱:${PROFILE.email}\n`;
    else if(m.type==='skills') md+=`\n## ${m.label}\n${(m.content||[]).join(' · ')}\n`;
    else if(m.type==='entries') md+=`\n## ${m.label}\n${(m.items||[]).map(it=>`### ${it.org||''}${it.title?' · '+it.title:''}${it.date?'  ('+it.date+')':''}\n${(it.bullets||[]).map(b=>'- '+b).join('\n')}`).join('\n\n')}\n`;
    else if(m.type==='projects') md+=`\n## ${m.label}\n${(m.items||[]).map(p=>`### ${p.star?'★ ':''}${p.name||''}${p.date?'  ('+p.date+')':''}\n${(p.bullets||[]).map(b=>'- '+b).join('\n')}`).join('\n\n')}\n`;
    else md+=`\n## ${m.label}\n${m.content||''}\n`;
  });
  openModal(`<div class="modal-head"><div><p class="eyebrow">— EXPORT</p><h2 style="margin-top:5px;">${tt('导出简历 · Markdown','Export resume · Markdown')}</h2></div><button class="x">${IC.x}</button></div>
    <div class="modal-body"><div class="jd-text" style="white-space:pre-wrap;">${md.replace(/</g,'&lt;')}</div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">关闭</button><button class="btn btn-accent" onclick="toast('已复制到剪贴板 (mock)')">复制 Markdown</button></div>`);
}

function ivNextRandom(){const pool=IV_BANK.filter(q=>q.id!==ivState.q.id);ivState.q=pool[Math.floor(Math.random()*pool.length)]||ivState.q;renderInterview();}

function ivStartRound(){
  const j=JOBS.find(x=>x.id===ivState.jobId);
  let qs=genQuestionsFor(j,4);
  if(!qs.some(q=>q.cat==='behavior')){const beh=IV_BANK.filter(q=>q.cat==='behavior');if(beh.length)qs=qs.concat([beh[Math.floor(Math.random()*beh.length)]]);}
  qs=qs.slice(0,4);
  ivState.round={qs, idx:0, recs:[], job:j.co}; ivState.summary=null; ivState.q=qs[0];
  renderInterview();
}
function ivRoundNext(){
  const r=ivState.round; if(!r) return;
  if(r.idx>=r.qs.length-1){ ivFinishRound(); return; }
  r.idx++; ivState.q=r.qs[r.idx]; renderInterview();
}
function ivFinishRound(){
  const r=ivState.round; const avg=k=>r.recs.reduce((a,x)=>a+x.scores[k],0)/r.recs.length;
  const scores={structure:+avg('structure').toFixed(1), depth:+avg('depth').toFixed(1), quant:+avg('quant').toFixed(1), overall:+avg('overall').toFixed(1)};
  const allTags=[...new Set(r.recs.flatMap(x=>x.tags||[]))];
  const dimNames={structure:tt('结构','Structure'),depth:tt('深度','Depth'),quant:tt('量化','Quant')};
  const weakest=['structure','depth','quant'].sort((a,b)=>scores[a]-scores[b])[0];
  const strongest=['structure','depth','quant'].sort((a,b)=>scores[b]-scores[a])[0];
  const rec={id:Date.now(), type:'round', qText:tt('整轮模拟面试 · '+r.qs.length+' 题 · '+r.job,'Full mock interview · '+r.qs.length+' Q · '+r.job), cat:'design', date:'2026.06.02', job:r.job, tags:allTags, qCount:r.qs.length, items:r.recs.map(x=>({qText:x.qText,scores:x.scores})), scores, good:[tt(dimNames[strongest]+'是你的强项('+scores[strongest].toFixed(1)+')',dimNames[strongest]+' is your strength ('+scores[strongest].toFixed(1)+')')], improve:[tt('优先补强'+dimNames[weakest]+'(当前 '+scores[weakest].toFixed(1)+')','Shore up '+dimNames[weakest]+' first (now '+scores[weakest].toFixed(1)+')'),tt('把高分题的"结论先行+量化"习惯迁移到所有题','Carry the "conclusion-first + quantified" habit to every question')]};
  IV_RECORDS.unshift(rec);
  ivState.summary={rec, recs:r.recs, scores, weakest:dimNames[weakest], strongest:dimNames[strongest]};
  ivState.q=null; ivState.round=null; renderInterview();
}

function growthChartHTML(){
  const recs=[...IV_RECORDS].reverse();
  const head=`<p class="seclabel">— GROWTH</p><h3 class="sectitle" style="font-size:15px;">${tt('成长曲线','Growth curve')}<span class="dot">.</span></h3>`;
  if(recs.length<2) return `<div class="sec" style="border-bottom:0.5px solid var(--border);padding-top:0;">${head}<p style="font-size:12.5px;color:var(--ink-3);margin:8px 0 0;">${tt('练满 2 次以上,这里会画出你的综合分成长曲线。','After 2+ sessions, your overall-score growth curve appears here.')}</p></div>`;
  const W=600,H=170,padL=26,padR=12,padT=14,padB=22,n=recs.length,yMin=4,yMax=10;
  const xs=i=>padL+(n===1?0:i*(W-padL-padR)/(n-1));
  const ys=v=>padT+(yMax-v)/(yMax-yMin)*(H-padT-padB);
  const line=(key,col,w)=>`<polyline points="${recs.map((r,i)=>xs(i).toFixed(1)+','+ys(r.scores[key]).toFixed(1)).join(' ')}" style="fill:none;stroke:${col};stroke-width:${w};stroke-linejoin:round;stroke-linecap:round;"/>`;
  const dots=recs.map((r,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(r.scores.overall).toFixed(1)}" r="3" style="fill:var(--accent);"/>`).join('');
  const grid=[5,7,9].map(v=>`<line x1="${padL}" y1="${ys(v).toFixed(1)}" x2="${W-padR}" y2="${ys(v).toFixed(1)}" style="stroke:var(--border);stroke-width:0.5;"/><text x="2" y="${(ys(v)+3).toFixed(1)}" style="fill:var(--ink-mute);font-size:9px;font-family:monospace;">${v}</text>`).join('');
  const delta=recs[n-1].scores.overall-recs[0].scores.overall;
  const trend=delta>0.2?`▲ +${delta.toFixed(1)}`:(delta<-0.2?`▼ ${delta.toFixed(1)}`:tt('≈ 持平','≈ flat'));
  return `<div class="sec" style="border-bottom:0.5px solid var(--border);padding-top:0;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;">${`<div>${head}</div>`}<div style="text-align:right;"><span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--ink-3);">${tt('综合分变化','Overall change')}</span><div style="font-family:var(--font-serif);font-size:20px;color:${delta>=0?'var(--status-done)':'var(--ink-3)'};font-weight:500;">${trend}</div></div></div>
    <div style="border:0.5px solid var(--border);margin-top:12px;padding:8px 6px;background:var(--bg-elevated);"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">${grid}${line('structure','var(--border-strong)',1)}${line('depth','var(--ink-mute)',1)}${line('overall','var(--accent)',2)}${dots}</svg></div>
    <div style="display:flex;gap:18px;margin-top:10px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);"><span style="color:var(--accent);">━ ${tt('综合','Overall')}</span><span>━ ${tt('结构','Structure')}</span><span>━ ${tt('深度','Depth')}</span><span style="margin-left:auto;">${tt('共 '+n+' 次练习',n+' sessions')}</span></div>
  </div>`;
}

/* domain 业务框定(接地气 AI 技能):按意图关键词把用户问题框成「先用 query_data 读真实数据再答」。

function frameQuery(text){

      + '若你给出了具体可直接套用的改写,请在回答**末尾**附一个代码块以便我一键应用(先正常用自然语言说明改动思路,再附代码块):\n```seeker:resume-edit\n{"jobId":<目标岗位 id>,"edits":[{"module":"<模块 key,如 summary / skills / honors / portfolio,或自定义模块 key>","content":<文本模块为字符串;skills 模块为字符串数组>}]}\n```\n'
      + 'module **只能是专业模块,绝不能是 basic 或任何联系方式 / 身份字段**;只列你确有改写的模块。我的原始请求:' + t;
  if(/面试|JD|陪我练|面试题/.test(t))
    return G + '读取我的目标 jobs(岗位/JD,含 id)后,给出贴合该岗位的面试题或面试反馈。'
      + '聚焦的那个岗位,请在回答**末尾**附一个代码块渲染面试卡(正文简洁):\n```seeker:interview-card\n{"jobId":<该岗位 id>}\n```\n我的原始请求:' + t;
  if(/训练计划|学习路线|怎么补|如何补|补齐|计划/.test(t))
    return G + '读取我的 skills(技能现状)、actions(在进行的训练)、jobs(目标岗位)后,给出针对我缺口与目标的具体训练计划。'
      + '聚焦要补的那项技能,请在回答**末尾**附一个代码块以渲染交互计划卡(正文保持简洁):\n```seeker:plan-card\n{"skill":"<要补的技能名,如 Rust / K8s / 分布式系统 / 系统设计>"}\n```\n我的原始请求:' + t;
  if(/匹配|该投|投哪/.test(t))
    return G + '读取我的 jobs(目标岗位,含 id)与 skills(我的技能)后,分析我最该投哪个岗位、理由、以及最关键的能力缺口。'
      + '聚焦的那个岗位,请在回答**末尾**附一个代码块以渲染交互雷达卡(正文保持简洁,不必重复卡里的数字):\n```seeker:match-card\n{"jobId":<该岗位 id>}\n```\n我的原始请求:' + t;
  if(/缺口|短板|不足/.test(t))
    return G + '读取我的 skills 与 jobs 后,对照目标岗位找出我最关键的能力缺口与补齐方向。'
      + '请在回答**末尾**附一个代码块渲染缺口卡(正文简洁):\n```seeker:gaps-card\n{}\n```\n我的原始请求:' + t;
  if(/最该做|下一步|现在做什么|该做什么/.test(t))
    return G + '读取我的 jobs/actions/skills 后,告诉我现在最该做什么、为什么(简洁)。'
      + '请在回答**末尾**附一个代码块渲染「下一步」轻卡:\n```seeker:next-card\n{}\n```\n我的原始请求:' + t;
  if(/市场价值|身价|值多少|薪资|薪酬/.test(t))
    return G + '读取我的 skills 与 jobs 后,给出有依据的市场价值/薪资判断。'
      + '请在回答**末尾**附一个代码块渲染市场价值卡(正文简洁):\n```seeker:value-card\n{}\n```\n我的原始请求:' + t;
  return text;

/* ===== 结构化简历回写(domain):AI 在回答末尾附 ```seeker:resume-edit 代码块 → 解析 →
   经 platform/guardrail 预览(前→后)+ 确认 + 撤销后,直接改写简历**专业模块**并落库。
   红线:绝不写 basic / locked 模块(联系方式本不在 resumes 集合,此处再二次守卫)。
   本期支持文本模块(content=字符串)与 skills(content=数组);work/projects/edu 等嵌套结构仅聊天建议。 */
/** 通用:从文本提取 ```seeker:<kind> 的 JSON 块,返回 {prose(已剥离块), data(解析失败=null)}。
    新增卡只需在 SEEKER_CARDS 注册 + frameQuery 加指令,本函数与 streamReply 零改动。 */
function extractSeekerBlock(text, kind){
  const s = String(text==null?'':text);
  const m = s.match(new RegExp('```seeker:' + kind + '\\s*([\\s\\S]*?)```'));
  if(!m) return { prose:s, data:null };
  let data = null;
  try{ data = JSON.parse(m[1].trim()); }catch(_e){}
  const prose = data ? (s.slice(0, m.index) + s.slice(m.index + m[0].length)).trim() : s; // 解析成功才剥离
  return { prose, data };
}
function showResumeProposal(bubble, edit, who){
  // 定位简历:edit.jobId → 当前打开的简历 → 仅有一份时取之
  let jid = edit.jobId;
  const has = k => k!=null && RESUME_TAILORED[k];
  if(!has(jid)){
    if(typeof resumeState==='object' && resumeState && has(resumeState.jobId)) jid = resumeState.jobId;
    else { const ks = Object.keys(RESUME_TAILORED); jid = (ks.length===1) ? ks[0] : null; }
  }
  const r = (jid!=null) ? RESUME_TAILORED[jid] : null;
  if(!r || !Array.isArray(r.modules)) return; // 无法定位:静默(自然语言建议仍在)
  const changes = [];
  for(const e of (edit.edits||[])){
    if(!e || e.module==null) continue;
    const mod = r.modules.find(x=>x.key===e.module);
    if(!mod || mod.type==='locked' || mod.key==='basic') continue; // 联系方式 / 锁定模块绝不可改
    let afterVal, before, after;
    if(mod.type==='skills'){
      afterVal = Array.isArray(e.content) ? e.content.map(s=>String(s).trim()).filter(Boolean)
               : String(e.content==null?'':e.content).split(/[、,，·\/|\n]+/).map(s=>s.trim()).filter(Boolean);
      before = Array.isArray(mod.content) ? mod.content.join(' · ') : '';
      after = afterVal.join(' · ');
    } else if(mod.type==='text'){
      afterVal = String(e.content==null?'':e.content).trim();
      before = String(mod.content==null?'':mod.content);
      after = afterVal;
    } else continue; // 嵌套结构(work/projects/edu)本期不结构化改写
    if(!after || after===before) continue;
    changes.push({ key:mod.key, label:mod.label||mod.key, type:mod.type, before, after, afterVal });
  }
  if(!changes.length) return;
  const names = changes.map(c=>c.label).join('、').replace(/</g,'&lt;');
  const card = el(`<div class="cop-card" style="margin-top:8px;"><div class="cct">✎ ${tt('AI 建议改写简历','AI suggests resume edits')} · ${changes.length} ${tt('处','edit(s)')}</div><div class="ccm">${tt('模块:','Modules: ')}${names}</div></div>`);
  const acts = el('<div class="cop-actions"></div>');
  const btn = el(`<button class="btn btn-accent">${tt('预览并应用 →','Preview & apply →')}</button>`);
  btn.onclick = ()=> reviewResumeProposal(jid, changes);
  acts.appendChild(btn); card.appendChild(acts);
  const host = (bubble && bubble.parentElement) || bubble;
  if(host){ host.appendChild(card); }
}
function reviewResumeProposal(jid, changes){
  const G = window.SeekerGuardrail; if(!G || !G.confirmDestructive) return;
  const r = RESUME_TAILORED[jid]; if(!r) return;
  const job = JOBS.find(j=>String(j.id)===String(jid));
  const snap = JSON.parse(JSON.stringify(r.modules)); // 撤销快照
  G.confirmDestructive({
    title: tt('应用 AI 简历改写?','Apply AI resume edits?'),
    detail: tt('将改写以下专业模块,不涉及姓名 / 电话 / 邮箱等联系方式。','Rewrites these professional modules; contact info untouched.'),
    changes: changes.map(c=>({label:c.label, before:c.before, after:c.after})),
    source: (job?job.co+' · ':'')+'AI',
    confirmLabel: tt('应用','Apply'),
    undoText: tt('已应用 AI 简历改写','AI resume edits applied'),
    onConfirm: ()=>{
      for(const c of changes){
        const mod = r.modules.find(x=>x.key===c.key);
        if(!mod || mod.type==='locked' || mod.key==='basic') continue; // 二次红线守卫
        mod.content = (mod.type==='skills') ? c.afterVal : c.after;
      }
      persistResume(jid);
      try{ if(typeof renderResumes==='function') renderResumes(); }catch(_e){}
    },
    onUndo: ()=>{
      RESUME_TAILORED[jid].modules = JSON.parse(JSON.stringify(snap));
      persistResume(jid);
      try{ if(typeof renderResumes==='function') renderResumes(); }catch(_e){}
    },
  });
}
/** 岗位能力雷达 SVG(真实数据:job.need 维度 × 我的技能等级 lvl/4)。维度<3 不画。 */
function matchRadarSVG(job){
  const dims=(job.need||[]).slice(0,6), n=dims.length;
  if(n<3) return '';
  const cx=105, cy=98, R=60, esc=s=>String(s==null?'':s).replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const pt=(i,r)=>{ const a=-Math.PI/2 + i*2*Math.PI/n; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  const ring=r=>dims.map((_,i)=>pt(i,r).map(v=>v.toFixed(1)).join(',')).join(' ');
  let grid=''; [0.34,0.67,1].forEach(f=>{ grid+=`<polygon points="${ring(R*f)}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`; });
  let axes='', labels='';
  dims.forEach((d,i)=>{ const [ax,ay]=pt(i,R); axes+=`<line x1="${cx}" y1="${cy}" x2="${ax.toFixed(1)}" y2="${ay.toFixed(1)}" stroke="var(--border)" stroke-width="0.5"/>`;
    const [lx,ly]=pt(i,R+11); const anc=Math.abs(lx-cx)<6?'middle':(lx>cx?'start':'end');
    labels+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anc}" dominant-baseline="middle" font-size="8.5" fill="var(--ink-3)">${esc(d).slice(0,5)}</text>`; });
  const dpts=dims.map((d,i)=>{ const s=skillByName(d); const lvl=s?s.lvl:0; const f=Math.max(0.08,Math.min(1,lvl/4)); return pt(i,R*f).map(v=>v.toFixed(1)).join(','); }).join(' ');

}

/** 安全渲染 AI 文本(Markdown → 受限 HTML;渲染器缺失则降级为转义纯文本,始终防注入)。 */
function aiHTML(text){
  if(window.SeekerMarkdown && window.SeekerMarkdown.render) return window.SeekerMarkdown.render(text);
  return String(text==null?'':text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/** 流式显示用:截断到任一 seeker 指令块起始之前(块在 onDone 解析,流式中途不外显原始 JSON)。 */
function displayText(s){
  s = String(s==null?'':s);
  const i = s.indexOf('```seeker:');
  return i>=0 ? s.slice(0, i) : s;
}
/** 工具循环进度文案(反焦虑:让用户知道 AI 正在读数据,而非卡住)。 */
function toolStatusText(info){
  const n = info && info.name;
  if(n==='query_data') return tt('正在查询你的本地数据…','Reading your local data…');
  if(n==='show_widget') return tt('正在生成…','Composing…');
  if(n==='memory'||n==='remember'||n==='recall') return tt('正在检索记忆…','Searching memory…');
  return tt('正在处理…','Working…');
}
/** 把「思考中」气泡变成流式目标,逐 token 写入(textContent 防注入)。
   关键:保留「思考中」指示直到首 token 才切流式 —— 工具循环(query_data 等)首字可达 10s+,
   期间用状态行反馈「正在查询你的本地数据…」,否则空 who 气泡会被误当「没反应」。 */
function streamReply(thinkBubble, text, who, scrollFn){
  const dots='<span class="ai-dots"><i></i><i></i><i></i></span>';
  thinkBubble.innerHTML='<span class="who">'+who+'</span><div class="cop-think">'+dots+'<span class="ai-status">'+tt('思考中…','Thinking…')+'</span></div>';
  let acc='', span=null, streaming=false;
  const startStream=()=>{ if(streaming)return; streaming=true; thinkBubble.innerHTML='<span class="who">'+who+'</span><span class="ai-stream"></span>'; span=thinkBubble.querySelector('.ai-stream'); };
  const setStatus=(msg)=>{ const s=thinkBubble.querySelector('.ai-status'); if(s) s.textContent=msg; };
  window.SeekerRT.ai.stream({ userText:text }, {
    onToken(t){ if(!streaming) startStream(); acc+=t; if(span) span.innerHTML=aiHTML(displayText(acc)); if(scrollFn) scrollFn(); }, // Markdown 安全渲染
    onTool(info){ if(!streaming) setStatus(toolStatusText(info)); if(scrollFn) scrollFn(); }, // 工具循环进度(此前未接,致空气泡)
    onWidget(w){
      /* show_widget(#2 · W1):平台渲染器产沙箱卡 → 插入对话流(thinkBubble 所在容器)。 */
      if(!streaming) startStream();
      try{ const card=window.SeekerWidgets.renderWidget(w); const host=thinkBubble.parentElement; if(host) host.appendChild(card); }
      catch(e){ console.error('[widget] 渲染失败', e); }
      if(scrollFn) scrollFn();
    },
    onError(err){ thinkBubble.innerHTML='<span class="who">'+who+'</span>'+aiErrHTML(err); if(scrollFn) scrollFn(); },
    onDone(){
      if(!streaming) startStream();                                   // 兜底:无 token 也有流式容器(不留空气泡)
      let prose = acc; const pending = [];                            // 逐卡型剥离 ```seeker 指令块(注册表驱动,加卡零改)
      for(const kind in SEEKER_CARDS){
        const b = extractSeekerBlock(prose, kind);
        if(b.data && SEEKER_CARDS[kind].valid(b.data)){ pending.push([kind, b.data]); prose = b.prose; }
      }
      if(span) span.innerHTML = aiHTML(prose);                        // 最终 Markdown 渲染(已去所有 JSON 块)
      const persistCards = pending.filter(([k])=>SEEKER_CARDS[k].persist).map(([kind,data])=>({kind,data}));
      persistMsg(who==='Agent'?'agent':'cop','ai', prose, persistCards); // 文字 + 可持久化卡指令(重启后重渲)
      for(const [kind, data] of pending){ try{ SEEKER_CARDS[kind].show(thinkBubble, data, who); }catch(e){ console.error('[card] '+kind, e); } }
      if(scrollFn) scrollFn();
    }
  });
}

function jobsPersistOn(){ return typeof isDesktop==='function' && isDesktop() && !!window.SeekerRT; }

function persistJob(job){ if(jobsPersistOn()) window.SeekerRT.db.upsert('jobs', job).catch(e=>console.error('[data] upsert job', e)); }
async function hydrateJobs(){

/* ===== 业务数据落地:其余集合接仓库(skills/actions/iv_records;jobs 见上,resumes 紧随) =====
   通用「整集合 upsert + 水合(首启种子)」。记录少,整集合写简单稳妥;隐私表不在此(走 profile)。 */
function collPersistOn(){ return jobsPersistOn(); } // 同条件:桌面 + SeekerRT
/** 给无 id 的集合补 id(skills 用 name 作天然键);其余(actions/iv_records)已有数值 id。 */
function withCollId(name, r){
  if(r && r.id!=null) return r;
  if(name==='skills') return Object.assign({ id:r.name }, r);
  return Object.assign({ id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6) }, r);
}
/** 整集合 upsert(变更后调用)。 @param {string} name @param {any[]} arr */
function persistColl(name, arr){
  if(!collPersistOn()) return;
  for(const r of arr){ window.SeekerRT.db.upsert(name, withCollId(name, r)).catch(e=>console.error('[data] upsert '+name, e)); }
}
/** 水合:载仓库;首启把内存 mock 作种子写入;再用仓库内容替换内存数组(就地)。 */
async function hydrateColl(name, arr){
  if(!collPersistOn()) return;
  try{
    let rows = await window.SeekerRT.db.list(name);
    if(!rows.length && arr.length){                 // 首启:种子写仓库
      for(const r of arr){ await window.SeekerRT.db.upsert(name, withCollId(name, r)); }
      rows = await window.SeekerRT.db.list(name);
    }
    arr.length=0; arr.push(...rows);                 // 水合(const 数组可变内容)
  }catch(e){ console.error('[data] hydrate '+name, e); }
}
/* resumes 红线安全持久化:只存专业模块结构(modules 含 basic/locked 标记但**无 PROFILE 内容**);
   联系方式始终从独立 profile 实时渲染、**绝不入 resumes 集合**,故 query_data('resumes') 天然不含联系方式。 */
function persistResume(jobId){
  if(!collPersistOn()) return;
  const r = RESUME_TAILORED[jobId]; if(!r) return;

async function hydrateResumes(){

  }catch(e){ console.error('[data] hydrate resumes', e); }

/* ===== messages 对话历史持久化(domain)。只存「可见对话」纯文本(user / AI 流式结果),
   不存招呼语 / 建议 chip / 富卡片 / widget(皆为临时 UI;widget 会话内重渲)。surface=cop|agent。
   隐私:messages 已移出后端 QUERYABLE → AI 不可 query_data('messages') 挖掘历史(经 History 拿上下文)。 */
let __msgSeq=0;
function persistMsg(surface, role, text, cards){
  if(!collPersistOn()) return;
  text = String(text==null?'':text);
  const hasCards = Array.isArray(cards) && cards.length>0;
  if(!text.trim() && !hasCards) return;                 // 纯空且无卡才跳过(纯卡片回复仍持久)
  const ts = Date.now();
  const rec = { id:'m_'+ts+'_'+(__msgSeq++), surface:surface, role:role, text:text, ts:ts };
  if(hasCards) rec.cards = cards;                        // 可持久化卡指令 [{kind,data}](view 卡;不含 resume-edit 提案)
  window.SeekerRT.db.upsert('messages', rec).catch(e=>console.error('[data] persist msg', e));
}
async function hydrateMessages(){
  if(!collPersistOn()) return;
  try{
    const rows = await window.SeekerRT.db.list('messages');
    if(!rows.length) return; // 无历史:保留 copInit 招呼语 / 让 agentGreet 照常
    rows.sort((a,b)=>(a.ts||0)-(b.ts||0));
    const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const draw = (rows, append, who) => { rows.forEach(r => {
      const bubble = append(r.role==='user'?'user':'ai',
        r.role==='user' ? esc(r.text) : ('<span class="who">'+who+'</span>'+aiHTML(r.text))); // AI 历史也渲染 Markdown
      if(r.role!=='user' && Array.isArray(r.cards)){ // 重渲持久化卡(用实时数据,卡保持新鲜;数据缺失则优雅跳过)
        for(const c of r.cards){ const def=c&&SEEKER_CARDS[c.kind]; if(def && def.persist && def.show){ try{ def.show(bubble, c.data||{}, who); }catch(_e){} } }
      }
    }); };
    const cop = rows.filter(r=>r.surface==='cop'), agent = rows.filter(r=>r.surface==='agent');
    // 有历史则清掉招呼语再渲染(#agentMsgs 有子节点后 setAppMode 不会再 agentGreet)
    if(cop.length){ const c=$('#copMsgs'); if(c){ c.innerHTML=''; draw(cop, copAppend, 'Copilot'); } }
    if(agent.length){ const c=$('#agentMsgs'); if(c){ c.innerHTML=''; draw(agent, agentAppend, 'Agent'); } }
  }catch(e){ console.error('[data] hydrate messages', e); }
}

/* ===== #2 W3:widget-action 回流处理(domain)。破坏性一律过 platform/guardrail。 =====
   widgetId 由平台按端口归属传入(不信任 iframe 自报);payload 仅当数据。 */
async function wgtAction(widgetId, action, payload){
  payload = payload || {};
  const destructive = /^(delete|clear|remove|reset|wipe)/i.test(String(action));
  if(!destructive){
    /* 安全动作:当「用户意图」致意(接 Agent 为后续 domain 决策)。 */
    try{ if(typeof toast==='function') toast((tt('组件请求:','Widget: '))+action); }catch(_e){}
    return;
  }
  const G=window.SeekerGuardrail; if(!G) return;
  if(action==='delete-job' && payload.id!=null && jobsPersistOn()){
    let snap=null;
    /* 预览显示可读目标(公司 · 岗位)而非裸 id —— 威胁 T5 的「预览」腿(#4 §⑥);未命中回退 #id。 */
    const _job=JOBS.find(x=>String(x.id)===String(payload.id));
    const _label=_job?(_job.co+(_job.role?(' · '+String(_job.role).split('·')[0].trim()):'')):('#'+payload.id);
    await G.confirmDestructive({
      title:tt('删除岗位?','Delete job?'), detail:tt('将删除岗位:','Will delete job: ')+_label,
      source:'widget '+widgetId, confirmLabel:tt('删除','Delete'),
      onConfirm:async()=>{ snap=await window.SeekerRT.db.remove('jobs',String(payload.id)); JOBS.length=0; JOBS.push(...await window.SeekerRT.db.list('jobs')); try{renderJobs();renderOverview();}catch(_e){} },
      onUndo:async()=>{ if(snap) await window.SeekerRT.db.upsert('jobs',snap); JOBS.length=0; JOBS.push(...await window.SeekerRT.db.list('jobs')); try{renderJobs();renderOverview();}catch(_e){} },
      undoText:tt('已删除岗位','Job deleted'),
    });
    return;
  }
  /* 通用破坏性(含演示):一律先预览+确认,确认后才执行 + 可撤销。 */
  await G.confirmDestructive({
    title:tt('确认操作','Confirm action'), detail:(tt('组件请求执行:','Widget requests: '))+action,
    source:'widget '+widgetId, confirmLabel:tt('执行','Run'),
    onConfirm:()=>{ window.__wgtExecuted={widgetId:widgetId, action:action}; },
    onUndo:()=>{ window.__wgtExecuted=null; },
    undoText:tt('已执行','Done')+' · '+action,
  });
}

  K.registerEscape(()=>{ const c=copEl(); if(c&&c.classList.contains('open')){copClose();return true;} return false; }, 30);
  K.registerEscape(()=>{ if(appMode==='agent'&&document.body.dataset.agent==='split'){agentCollapse();return true;} return false; }, 20);
  K.attach();
}

/* ---------- INIT ---------- */

buildNav();
buildPages();
$('#themeBtn2').innerHTML=document.documentElement.dataset.theme==='dark'?IC.sun:IC.moon;
$('#themeBtn2').onclick=toggleTheme;
copInit();
agentInit();
initShell();
initKeys();
go('overview');
appReady=true;
</script>
